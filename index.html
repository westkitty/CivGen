<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civilization Simulator Lite</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%23112538' d='M10 56V24l7-6 7 6v32zM26 56V18l8-7 8 7v38zM44 56V24l7-6 7 6v32z'/%3E%3Cpath fill='%23d59f4d' d='M9 22l8-7 8 7M25 17l9-8 9 8M43 22l8-7 8 7'/%3E%3Cpath fill='%23f0eadb' d='M14 34h6v8h-6zm16-6h7v8h-7zm17 7h6v8h-6z'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #112538;
        --paper: #f0eadb;
        --sand: #dcc9a3;
        --gold: #d59f4d;
        --brass: #c57d2c;
        --sea: #2f7f9d;
        --forest: #42734f;
        --wine: #7f3f35;
        --brick: #b85e43;
        --slate: #466071;
        --crisis: #a63d33;
        --prosper: #4f8e5d;
        --panel: rgba(245, 238, 223, 0.88);
        --panel-edge: rgba(17, 37, 56, 0.18);
        --shadow: 0 16px 40px rgba(17, 37, 56, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--ink);
        font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 245, 214, 0.95), rgba(240, 234, 219, 0.84) 22%, rgba(212, 206, 183, 0.55) 60%, transparent 70%),
          linear-gradient(160deg, #dbe3df 0%, #c2d0cb 35%, #91b0b2 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(17, 37, 56, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(17, 37, 56, 0.06) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      }

      #root {
        min-height: 100vh;
      }

      .app-shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }

      .header-card,
      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-edge);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .header-card {
        position: relative;
        overflow: hidden;
        padding: 22px 24px 18px;
        border-radius: 28px;
        background:
          linear-gradient(120deg, rgba(255, 249, 233, 0.96), rgba(238, 226, 192, 0.88) 40%, rgba(225, 216, 203, 0.78) 100%);
      }

      .header-card::after {
        content: "";
        position: absolute;
        inset: auto -80px -110px auto;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(213, 159, 77, 0.28), rgba(213, 159, 77, 0));
      }

      .title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      h1,
      h2,
      h3,
      h4 {
        margin: 0;
        font-family: "Bree Serif", Georgia, serif;
        letter-spacing: 0.02em;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1;
      }

      .subtitle {
        margin-top: 10px;
        max-width: 860px;
        font-size: 0.98rem;
        line-height: 1.5;
        color: rgba(17, 37, 56, 0.82);
      }

      .status-banner {
        min-width: 240px;
        padding: 12px 14px;
        border-radius: 18px;
        border: 1px solid rgba(17, 37, 56, 0.12);
        background: rgba(255, 252, 245, 0.72);
      }

      .status-banner strong {
        display: block;
        margin-bottom: 6px;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .status-banner.prosper {
        color: var(--prosper);
        border-color: rgba(79, 142, 93, 0.35);
        background: rgba(230, 247, 232, 0.8);
      }

      .status-banner.crisis {
        color: var(--crisis);
        border-color: rgba(166, 61, 51, 0.35);
        background: rgba(253, 233, 226, 0.88);
      }

      .meta-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .meta-pill {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(17, 37, 56, 0.07);
        font-size: 0.92rem;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .meta-pill strong {
        color: var(--sea);
      }

      .main-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.7fr) minmax(340px, 0.95fr);
        gap: 18px;
        margin-top: 18px;
      }

      .left-column,
      .right-column {
        display: grid;
        gap: 18px;
      }

      .panel {
        border-radius: 24px;
        padding: 18px;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .panel-header p,
      .minor-copy {
        margin: 0;
        color: rgba(17, 37, 56, 0.72);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .world-panel {
        padding: 18px;
        background:
          linear-gradient(180deg, rgba(255, 253, 245, 0.92), rgba(226, 233, 226, 0.76));
      }

      .world-wrap {
        position: relative;
      }

      canvas {
        width: 100%;
        display: block;
        border-radius: 22px;
        border: 1px solid rgba(17, 37, 56, 0.12);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
        background: linear-gradient(180deg, #d1e1e5, #96b0a3 45%, #7d9a71 46%, #5f7b5e 100%);
      }

      .world-overlay {
        position: absolute;
        left: 16px;
        right: 16px;
        top: 16px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
      }

      .world-chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(11, 30, 45, 0.68);
        color: #f7f1df;
        font-size: 0.84rem;
        letter-spacing: 0.03em;
      }

      .control-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 12px 15px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--sea), #3f93a4);
        color: #f6fbfc;
        box-shadow: 0 12px 22px rgba(47, 127, 157, 0.22);
      }

      .btn-secondary {
        background: rgba(17, 37, 56, 0.08);
        color: var(--ink);
      }

      .btn-danger {
        background: linear-gradient(135deg, var(--wine), var(--brick));
        color: #fff7f0;
      }

      .btn-accent {
        background: linear-gradient(135deg, #e0b064, var(--gold));
        color: #342411;
      }

      .resource-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .resource-card {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-radius: 20px;
        background: rgba(255, 252, 245, 0.8);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .resource-card img,
      .icon-badge {
        width: 52px;
        height: 52px;
        object-fit: contain;
        flex: 0 0 auto;
      }

      .resource-card h4 {
        font-size: 0.98rem;
      }

      .resource-value {
        font-size: 1.45rem;
        font-weight: 700;
        margin-top: 2px;
      }

      .delta {
        font-size: 0.86rem;
        margin-top: 4px;
      }

      .delta.good {
        color: var(--prosper);
      }

      .delta.bad {
        color: var(--crisis);
      }

      .meter-grid {
        display: grid;
        gap: 12px;
      }

      .meter-row {
        display: grid;
        grid-template-columns: minmax(112px, 132px) 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .meter-name {
        display: flex;
        gap: 10px;
        align-items: center;
        font-weight: 700;
      }

      .meter-bar {
        position: relative;
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(17, 37, 56, 0.08);
      }

      .meter-fill {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: inherit;
      }

      .policy-list {
        display: grid;
        gap: 12px;
      }

      .policy-row {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.84);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .policy-topline,
      .policy-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .policy-label {
        font-size: 1rem;
        font-weight: 700;
      }

      .policy-controls {
        margin-top: 10px;
      }

      .policy-controls button {
        min-width: 38px;
        height: 38px;
        padding: 0;
        border-radius: 12px;
      }

      .policy-level {
        min-width: 48px;
        text-align: center;
        font-weight: 700;
        font-size: 1.05rem;
      }

      .points-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(17, 37, 56, 0.08);
        font-weight: 700;
      }

      .history-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .spark-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.8);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .spark-card svg {
        width: 100%;
        height: 84px;
        display: block;
      }

      .event-list {
        display: grid;
        gap: 12px;
        max-height: 540px;
        overflow: auto;
        padding-right: 4px;
      }

      .event-item {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.8);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .event-item h4 {
        font-size: 0.98rem;
      }

      .event-meta {
        font-size: 0.82rem;
        color: rgba(17, 37, 56, 0.64);
        margin-top: 2px;
      }

      .event-body {
        margin-top: 5px;
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .event-tag {
        display: inline-flex;
        margin-top: 6px;
        padding: 6px 8px;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: rgba(17, 37, 56, 0.08);
      }

      .legend-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .legend-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 252, 245, 0.8);
        border: 1px solid rgba(17, 37, 56, 0.08);
        font-size: 0.84rem;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .footer-note {
        margin-top: 18px;
        font-size: 0.84rem;
        color: rgba(17, 37, 56, 0.72);
      }

      @media (max-width: 1080px) {
        .main-grid {
          grid-template-columns: 1fr;
        }

        .title-row {
          flex-direction: column;
        }

        .status-banner {
          width: 100%;
        }
      }

      @media (max-width: 720px) {
        .app-shell {
          padding: 14px;
        }

        .resource-grid,
        .history-grid {
          grid-template-columns: 1fr;
        }

        .meter-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react">
      const { useEffect, useReducer, useRef, useState } = React;

      const TURN_INTERVAL_MS = 1000;
      const YEAR_STEP = 5;
      const MAX_HISTORY = 24;
      const POLICY_POINT_CAP = 14;

      const STAGES = [
        { key: "tribe", label: "Tribe", pop: 8, industry: 6, tech: 1, score: 6, hub: "hubTribalCamp" },
        { key: "village", label: "Village", pop: 18, industry: 16, tech: 2, score: 14, hub: "hubVillageCenter" },
        { key: "town", label: "Town", pop: 32, industry: 28, tech: 3, score: 28, hub: "hubTownMarket" },
        { key: "cityState", label: "City-State", pop: 52, industry: 48, tech: 4, score: 48, hub: "hubCityStateForum" },
        { key: "kingdom", label: "Kingdom", pop: 80, industry: 72, tech: 5, score: 72, hub: "hubKingdomKeep" },
        { key: "industrialState", label: "Industrial State", pop: 115, industry: 118, tech: 6, score: 110, hub: "hubIndustrialCore" },
        { key: "modernNation", label: "Modern Nation", pop: 150, industry: 150, tech: 8, score: 168, hub: "hubModernSkyline" },
        { key: "spacefaringSociety", label: "Spacefaring Society", pop: 180, industry: 190, tech: 10, score: 245, hub: "hubLaunchComplex" },
      ];

      const POLICY_DEFS = {
        agriculture: {
          label: "Agriculture",
          summary: "More food; slight ecological wear at high output.",
          detail: "Food output rises sharply. High levels graze the land harder.",
        },
        industry: {
          label: "Industry",
          summary: "More industry; pollution and morale pressure.",
          detail: "Infrastructure surges, but smoke, noise, and waste rise with it.",
        },
        education: {
          label: "Education",
          summary: "More knowledge and modest morale gain.",
          detail: "Schools stabilize growth and sharpen long-term planning.",
        },
        health: {
          label: "Health",
          summary: "Resilience boost; costs industrial capacity.",
          detail: "Public care protects population against famine and disease cascades.",
        },
        environment: {
          label: "Environment",
          summary: "Ecology recovers; short-term industry slows.",
          detail: "Cleaner land lowers disaster risk and supports food output.",
        },
        security: {
          label: "Security",
          summary: "Lower unrest; excessive force depresses morale.",
          detail: "Order improves, but heavy policing is not a popularity contest.",
        },
        welfare: {
          label: "Welfare",
          summary: "Happiness and stability support; costs food and industry.",
          detail: "The people prefer not starving and not being ignored. Strange but true.",
        },
        research: {
          label: "Research",
          summary: "Faster technology growth; costs food and industry.",
          detail: "A sharper future built on present sacrifice.",
        },
      };

      const RESOURCE_META = [
        { key: "food", label: "Food", max: 300, icon: "iconFood", color: "#6d8f3a" },
        { key: "industry", label: "Industry", max: 300, icon: "iconIndustry", color: "#8b5b3b" },
        { key: "knowledge", label: "Knowledge", max: 300, icon: "iconKnowledge", color: "#5577b7" },
        { key: "population", label: "Population", max: 500, icon: "iconPopulation", color: "#8660ad" },
      ];

      const METRIC_META = [
        { key: "happiness", label: "Happiness", icon: "iconHappiness", color: "#d59f4d" },
        { key: "health", label: "Health", icon: "iconHealth", color: "#4f8e5d" },
        { key: "environment", label: "Environment", icon: "iconEnvironment", color: "#2f7f9d" },
        { key: "stability", label: "Stability", icon: "iconStability", color: "#466071" },
        { key: "unrest", label: "Unrest", icon: "iconUnrest", color: "#a63d33" },
      ];

      const HISTORY_META = [
        { key: "food", label: "Food Trend", color: "#5d8739" },
        { key: "population", label: "Population Trend", color: "#8b66b0" },
        { key: "knowledge", label: "Knowledge Trend", color: "#4f78c2" },
        { key: "legacyScore", label: "Legacy Trend", color: "#c57d2c" },
      ];

      const PALETTE = {
        skyTop: "#d7edf7",
        skyBottom: "#90bccd",
        landA: "#8ea86c",
        landB: "#5d764f",
        waterA: "#7cc3d8",
        waterB: "#2f7f9d",
        shadow: "#173246",
        cream: "#f5eddb",
        brass: "#d59f4d",
        brick: "#b85e43",
        roof: "#7f3f35",
        slate: "#466071",
        forest: "#42734f",
        moss: "#7ba46e",
        smoke: "#68737d",
        crisis: "#a63d33",
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function round1(value) {
        return Math.round(value * 10) / 10;
      }

      function formatSigned(value) {
        const rounded = Math.round(value * 10) / 10;
        if (rounded > 0) return `+${rounded}`;
        if (rounded < 0) return `${rounded}`;
        return "0";
      }

      function nextSeed(seed) {
        return (seed * 1664525 + 1013904223) >>> 0;
      }

      function takeRandom(seed) {
        const updated = nextSeed(seed);
        return { seed: updated, value: updated / 4294967296 };
      }

      function encodeSvg(svg) {
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      }

      function createSvgImage(svg) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = encodeSvg(svg);
        });
      }

      function artDefs() {
        return `
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${PALETTE.skyTop}" />
              <stop offset="100%" stop-color="${PALETTE.skyBottom}" />
            </linearGradient>
            <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
              <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="rgba(23,50,70,0.32)" />
            </filter>
          </defs>
        `;
      }

      function makeIconSvg({ outer, inner, accent, symbol, badge }) {
        return `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
            <defs>
              <linearGradient id="outerGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="${outer}" />
                <stop offset="100%" stop-color="${inner}" />
              </linearGradient>
              <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(17,37,56,0.28)" />
              </filter>
            </defs>
            <g filter="url(#iconShadow)">
              <path d="M48 4l18 8 16 16 10 20-5 24-17 15-22 5-20-7-15-15-8-21 7-22 14-16z" fill="url(#outerGrad)" stroke="${accent}" stroke-width="4" stroke-linejoin="round"/>
              <path d="M48 15l12 5 11 11 6 16-3 17-12 11-15 4-15-5-10-10-6-15 4-16 10-11z" fill="rgba(255,255,255,0.18)"/>
            </g>
            ${symbol}
            ${badge || ""}
          </svg>
        `;
      }

      function makeBadgeSvg({ outer, inner, accent, symbol }) {
        return `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
            <defs>
              <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="${outer}" />
                <stop offset="100%" stop-color="${inner}" />
              </linearGradient>
              <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(17,37,56,0.25)" />
              </filter>
            </defs>
            <g filter="url(#badgeShadow)">
              <path d="M48 6l20 9 16 18 4 21-7 19-15 13-18 4-18-5-15-14-7-18 4-21 15-18z" fill="url(#badgeGrad)" stroke="${accent}" stroke-width="4" stroke-linejoin="round"/>
              <path d="M20 78l10-2 6 14-18-6z" fill="${accent}" opacity="0.9"/>
              <path d="M76 78l-10-2-6 14 18-6z" fill="${accent}" opacity="0.9"/>
            </g>
            ${symbol}
          </svg>
        `;
      }

      function makeStructureSvg({ body, details, baseColor = "#5e7651", width = 180, height = 140 }) {
        return `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}">
            ${artDefs()}
            <ellipse cx="${width / 2}" cy="${height - 10}" rx="${width * 0.34}" ry="10" fill="rgba(23,50,70,0.18)" />
            <path d="M15 ${height - 18}c20-10 38-14 60-12 18 2 32 11 50 11 16 0 26-6 40-6 9 0 16 2 22 5v12H15z" fill="${baseColor}" opacity="0.92"/>
            <g filter="url(#shadow)">
              ${body}
            </g>
            ${details}
          </svg>
        `;
      }

      function makeTerrainSvg({ groundA, groundB, surface, detail, width = 180, height = 120 }) {
        return `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}">

      function stageIndexFromLabel(label) {
        return STAGES.findIndex((stage) => stage.label === label);
      }

      function computeStage(resources) {
        let current = STAGES[0];
        for (const stage of STAGES) {
          if (
            resources.population >= stage.pop &&
            resources.industry >= stage.industry &&
            resources.technologyLevel >= stage.tech
          ) {
            current = stage;
          }
        }
        return current;
      }

      function historyPush(history, value) {
        return [...history, round1(value)].slice(-MAX_HISTORY);

      function createInitialState(seed = (Date.now() >>> 0) || 7) {
        const policies = {
          agriculture: 2,
          industry: 2,
          education: 1,

          environment: 1,

          turn: 0,
          year: 1000,
          food: 88,
          industry: 54,
          knowledge: 32,

      function totalPolicyPoints(policies) {
        return Object.values(policies).reduce((sum, value) => sum + value, 0);
      }

      function getEffectModifiers(activeEffects) {
        return activeEffects.reduce(
          (acc, effect) => {
            const mods = effect.modifiers || {};
            if (mods.foodMultiplier) acc.foodMultiplier *= mods.foodMultiplier;
            if (mods.industryMultiplier) acc.industryMultiplier *= mods.industryMultiplier;
            if (mods.knowledgeMultiplier) acc.knowledgeMultiplier *= mods.knowledgeMultiplier;
            if (mods.foodDemandMultiplier) acc.foodDemandMultiplier *= mods.foodDemandMultiplier;
            if (mods.populationDelta) acc.populationDelta += mods.populationDelta;
            return acc;
          },
          {
            foodMultiplier: 1,
            industryMultiplier: 1,
            knowledgeMultiplier: 1,
            foodDemandMultiplier: 1,
            populationDelta: 0,
          }
        );
      }

      function chooseEvent(state, seed) {
        const weightEntries = Object.entries(EVENT_DEFS).map(([key, def]) => ({
          key,
          weight: Math.max(0, def.weight(state)),
        }));
        const totalWeight = weightEntries.reduce((sum, entry) => sum + entry.weight, 0);
        const calmWeight = 2.8;
        const { seed: afterRoll, value } = takeRandom(seed);
        let cursor = value * (totalWeight + calmWeight);
        if (cursor < calmWeight) {
          return { seed: afterRoll, eventKey: null };
        }
        cursor -= calmWeight;
        for (const entry of weightEntries) {
          cursor -= entry.weight;
          if (cursor <= 0) {
            return { seed: afterRoll, eventKey: entry.key };
          }
        }
        return { seed: afterRoll, eventKey: weightEntries[weightEntries.length - 1]?.key || null };
      }

        const updated = { ...state };
        for (const [key, delta] of Object.entries(effects || {})) {
          if (key === "population") {
            updated.population = clamp(Math.round(updated.population + delta), 0, 500);
          } else if (key === "food") {
            updated.food = clamp(updated.food + delta, 0, 300);
          } else if (key === "industry") {
            updated.industry = clamp(updated.industry + delta, 0, 300);
          } else if (key === "knowledge") {
            updated.knowledge = clamp(updated.knowledge + delta, 0, 300);
          } else if (["happiness", "health", "environment", "stability", "unrest"].includes(key)) {
            updated[key] = clamp(updated[key] + delta, 0, 100);
          }
        }
        return updated;
      }

      // Deterministic turn pipeline: update resources, apply civic drift, resolve one event, then check progression.
      function simulateTurn(currentState) {
        if (currentState.status === "won" || currentState.status === "lost") {
          return currentState;
        }

        const policy = currentState.policies;
        const previousStage = currentState.developmentStage;
        let next = {
          ...currentState,
          turn: currentState.turn + 1,
          year: currentState.year + YEAR_STEP,
        };
        const logEntries = [];

        const effectMods = getEffectModifiers(currentState.activeEffects);
        next.activeEffects = currentState.activeEffects
          .map((effect) => ({ ...effect, turnsLeft: effect.turnsLeft - 1 }))
          .filter((effect) => effect.turnsLeft > 0);

        const stageIndex = Math.max(0, stageIndexFromLabel(currentState.developmentStage));
        const healthFactor = 0.65 + currentState.health / 200;
        const environmentFactor = 0.68 + currentState.environment / 180;
        const stabilityFactor = 0.68 + currentState.stability / 200;
        const happinessFactor = 0.65 + currentState.happiness / 200;
        const pollutionPenalty = 1 - Math.max(0, 58 - currentState.environment) / 180;

        const foodProduction =
          currentState.population *
          (0.55 + 0.12 * policy.agriculture + 0.03 * currentState.technologyLevel) *
          healthFactor *
          environmentFactor *
          effectMods.foodMultiplier;
        const industryProduction =
          currentState.population *
          (0.35 + 0.12 * policy.industry) *
          stabilityFactor *
          pollutionPenalty *
          effectMods.industryMultiplier *
          (1 - policy.environment * 0.03);
        const knowledgeProduction =
          currentState.population *
          (0.18 + 0.1 * policy.education + 0.12 * policy.research) *
          happinessFactor *
          (1 + currentState.technologyLevel * 0.02) *
          effectMods.knowledgeMultiplier;

        const industryMaintenance =
          policy.health * 3.2 + policy.welfare * 2.8 + policy.research * 4 + policy.environment * 1.8;
        const foodMaintenance = policy.welfare * 2 + policy.research * 1.4;
        const foodDemand =
          currentState.population * (1 + stageIndex * 0.02) * effectMods.foodDemandMultiplier;

        const newFood = clamp(currentState.food + foodProduction - foodDemand - foodMaintenance, 0, 300);
        const newIndustry = clamp(currentState.industry + industryProduction - industryMaintenance, 0, 300);
        const newKnowledge = clamp(currentState.knowledge + knowledgeProduction, 0, 300);

        const foodDelta = newFood - currentState.food;
        const industryDelta = newIndustry - currentState.industry;
        const knowledgeDelta = newKnowledge - currentState.knowledge;
        const shortage = Math.max(0, foodDemand + foodMaintenance - (currentState.food + foodProduction));
        const surplusRatio = (newFood + 1) / Math.max(1, currentState.population);

        next.food = round1(newFood);
        next.industry = round1(newIndustry);
        next.knowledge = round1(newKnowledge);

        const happinessDelta =
          policy.welfare * 1.8 +
          policy.education * 0.7 -
          policy.security * 0.6 -
          policy.industry * 0.4 +
          (foodDelta > 5 ? 1.3 : 0) -
          shortage * 0.22;
        const healthDelta =
          policy.health * 2.2 +
          (foodDelta > 0 ? 0.8 : 0) -
          policy.industry * 0.55 -
          shortage * 0.35 -
          Math.max(0, 42 - currentState.environment) / 26;
        const environmentDelta =
          policy.environment * 2.4 -
          policy.industry * 1.65 -
          policy.agriculture * 0.45 +
          (policy.research >= 2 ? 0.45 : 0);
        const unrestDelta =
          1.2 +
          Math.max(0, 48 - currentState.happiness) / 18 +
          Math.max(0, 55 - currentState.stability) / 20 +
          Math.max(0, 50 - currentState.environment) / 28 -
          policy.security * 1.6 -
          policy.welfare * 0.8 +
          shortage * 0.26;

        next.happiness = clamp(round1(currentState.happiness + happinessDelta), 0, 100);
        next.health = clamp(round1(currentState.health + healthDelta), 0, 100);
        next.environment = clamp(round1(currentState.environment + environmentDelta), 0, 100);
        next.unrest = clamp(round1(currentState.unrest + unrestDelta), 0, 100);

        const stabilityDelta =
          policy.security * 1.4 +
          policy.welfare * 0.5 +
          next.happiness / 70 -
          next.unrest / 36 -
          shortage * 0.28;
        next.stability = clamp(round1(currentState.stability + stabilityDelta), 0, 100);

        const populationPressure =
          (surplusRatio - 1.2) * 1.7 +
          (next.health - 55) / 22 +
          (next.happiness - 52) / 28 -
          next.unrest / 40 +
          effectMods.populationDelta;
        const populationDelta = clamp(Math.round(populationPressure), -10, 8);
        next.population = clamp(currentState.population + populationDelta, 0, 500);

        let rngSeed = currentState.rngSeed;
        const eventChoice = chooseEvent(next, rngSeed);
        rngSeed = eventChoice.seed;
        if (eventChoice.eventKey) {
          const definition = EVENT_DEFS[eventChoice.eventKey];
          const resolution = definition.apply(next);
          next = applyImmediateEffects(next, resolution.immediate);
          if (resolution.effect) {
            next.activeEffects = [...next.activeEffects, resolution.effect];
          }
          logEntries.unshift({
            id: `event-${next.turn}-${eventChoice.eventKey}`,
            year: next.year,
            turn: next.turn,
            title: definition.label,
            detail: definition.describe(next),
            icon: definition.icon,
            tag: resolution.effect ? `${resolution.effect.turnsLeft} turns` : "Immediate",
          });
        }

        next.technologyLevel = clamp(
          1 +
            Math.floor(next.knowledge / 35) +
            Math.floor((policy.research + policy.education) / 4),
          1,
          10
        );

        const stage = computeStage(next);
        next.developmentStage = stage.label;
        if (stage.label !== previousStage) {
          logEntries.unshift({
            id: `stage-${next.turn}-${stage.key}`,
            year: next.year,
            turn: next.turn,
            title: `Stage Reached: ${stage.label}`,
            detail: `Population, industry, and technology crossed into a new era.`,
            icon: "iconLegacy",
            tag: "Milestone",
          });
        }

        const prosperityBonus =
          (next.happiness + next.health + next.stability + Math.max(0, next.environment - 30)) / 8;
        next.legacyScore = Math.round(
          currentState.legacyScore +
            next.population * 0.35 +
            next.technologyLevel * 2 +
            prosperityBonus +
            stage.score
        );

        next.history = {
          food: historyPush(currentState.history.food, next.food),
          population: historyPush(currentState.history.population, next.population),
          knowledge: historyPush(currentState.history.knowledge, next.knowledge),
          legacyScore: historyPush(currentState.history.legacyScore, next.legacyScore),
        };

        next.lastBreakdown = {
          foodDelta: round1(next.food - currentState.food),
          industryDelta: round1(next.industry - currentState.industry),
          knowledgeDelta: round1(next.knowledge - currentState.knowledge),
          populationDelta: next.population - currentState.population,
        };

        if (
          next.developmentStage === "Spacefaring Society" &&
          next.population >= 180 &&
          next.stability >= 40 &&
          next.environment >= 25
        ) {
          next.status = "won";
          next.victoryText =
            "Your civilization reached a spacefaring future without collapsing its institutions or habitat.";
          logEntries.unshift({
            id: `victory-${next.turn}`,
            year: next.year,
            turn: next.turn,
            title: "Victory",
            detail: next.victoryText,
            icon: "iconLegacy",
            tag: "Success",
          });
        } else if (next.population <= 0 || next.health <= 0 || next.stability <= 0) {
          next.status = "lost";
          next.victoryText =
            next.population <= 0
              ? "The people are gone. Management turned into archaeology."
              : next.health <= 0
              ? "The civilization collapsed under public health failure."
              : "Authority dissolved and the state disintegrated.";
          logEntries.unshift({
            id: `loss-${next.turn}`,
            year: next.year,
            turn: next.turn,
            title: "Collapse",
            detail: next.victoryText,
            icon: "iconUnrest",
            tag: "Failure",
          });
        } else if (next.status === "menu") {
          next.status = "paused";
        }

        const activeEffectNames = next.activeEffects.map((effect) => `${effect.name} (${effect.turnsLeft})`);
        next.statusText =
          next.status === "won"
            ? next.victoryText
            : next.status === "lost"
            ? next.victoryText
            : activeEffectNames.length
            ? `Active effects: ${activeEffectNames.join(", ")}`
            : next.unrest > 60
            ? "Tension is climbing. Security, welfare, or actual competence would help."
            : next.environment < 35
            ? "The land is under strain. Industry is outrunning restraint."
            : next.population > 120 && next.food < 70
            ? "Growth is outrunning supply. Granaries first, speeches later."
            : "The machinery of civilization continues to complain, but mostly function.";

        next.eventLog = [...logEntries, ...currentState.eventLog].slice(0, 18);
        next.rngSeed = rngSeed;
        return next;
      }

      function reducer(state, action) {
        switch (action.type) {
          case "ASSETS_READY":
            return { ...state, assetsReady: true };
          case "START_GAME":
            return state.status === "menu" ? { ...state, status: "running" } : state;
          case "PAUSE_GAME":
            return state.status === "running" ? { ...state, status: "paused" } : state;
          case "RESUME_GAME":
            return state.status === "paused" ? { ...state, status: "running" } : state;
          case "STEP_TURN": {
            const stepped = simulateTurn({
              ...state,
              status: state.status === "running" ? "running" : "paused",
            });
            return stepped.status === "running" ? stepped : { ...stepped, status: stepped.status };
          }
          case "RESET_GAME": {
            const reset = createInitialState(action.seed);
            reset.assetsReady = state.assetsReady;
            return reset;
          }
          case "SET_POLICY": {
            if (state.status === "won" || state.status === "lost") return state;
            const current = state.policies[action.key];
            const nextLevel = clamp(current + action.delta, 0, 3);
            if (nextLevel === current) return state;
            const nextPolicies = { ...state.policies, [action.key]: nextLevel };
            if (totalPolicyPoints(nextPolicies) > POLICY_POINT_CAP) return state;
            return { ...state, policies: nextPolicies };
          }
          default:
            return state;
        }
      }

      function loadAssetPack() {
        const svgMap = buildAssetSvgs();
        return Promise.all(
          Object.entries(svgMap).map(async ([key, svg]) => {
            const image = await createSvgImage(svg);
            return [key, { svg, uri: encodeSvg(svg), image }];
          })
        ).then((entries) => Object.fromEntries(entries));
      }

      function getWorldSnapshot(state) {
        const stage = STAGES.find((entry) => entry.label === state.developmentStage) || STAGES[0];
        const homes = Math.max(2, Math.round(state.population / 18));
        const farms = Math.max(2, state.policies.agriculture + Math.round(state.food / 90));
        const industrialSites = Math.max(1, state.policies.industry + Math.round(state.industry / 100));
        const civicSites = Math.max(1, state.policies.education + state.policies.health + Math.round(state.knowledge / 120));
        return {
          mode: state.status,
          turn: state.turn,
          year: state.year,
          stage: state.developmentStage,
          technologyLevel: state.technologyLevel,
          resources: {
            food: state.food,
            industry: state.industry,
            knowledge: state.knowledge,
            population: state.population,
            happiness: state.happiness,
            health: state.health,
            environment: state.environment,
            stability: state.stability,
            unrest: state.unrest,
            legacyScore: state.legacyScore,
          },
          activeEffects: state.activeEffects.map((effect) => ({
            name: effect.name,
            turnsLeft: effect.turnsLeft,
          })),
          world: {
            origin: "Canvas origin is top-left; x grows right, y grows down.",
            hub: stage.hub,
            homes,
            farms,
            industrialSites,
            civicSites,
            unrestSignals: state.unrest > 55 ? 2 : 0,
            smokeSignals: state.policies.industry + Math.max(0, 50 - state.environment) / 25,
          },
        };
      }

      function getStatusBanner(state) {
        if (state.status === "won") {
          return { tone: "prosper", title: "Victory", body: state.victoryText };
        }
        if (state.status === "lost") {
          return { tone: "crisis", title: "Collapse", body: state.victoryText };
        }
        if (state.unrest > 60 || state.stability < 40 || state.health < 30) {
          return { tone: "crisis", title: "Crisis", body: state.statusText };
        }
        if (state.happiness > 70 && state.health > 70 && state.environment > 50) {
          return { tone: "prosper", title: "Prosperity", body: state.statusText };
        }
        return { tone: "", title: "Status", body: state.statusText };
      }

      function meterTone(value) {
        if (value >= 70) return "#4f8e5d";
        if (value >= 40) return "#d59f4d";
        return "#a63d33";
      }

      function sparkPoints(values) {
        if (!values.length) return "";
        const min = Math.min(...values);
        const max = Math.max(...values);
        return values
          .map((value, index) => {
            const x = values.length === 1 ? 0 : (index / (values.length - 1)) * 100;
            const y = max === min ? 50 : 100 - ((value - min) / (max - min)) * 100;
            return `${x},${y}`;
          })
          .join(" ");
      }

      function GameHeader({ state }) {
        const stage = STAGES.find((entry) => entry.label === state.developmentStage) || STAGES[0];
        const banner = getStatusBanner(state);
        return (
          <section className="header-card">
            <div className="title-row">
              <div>
                <h1>Civilization Simulator Lite</h1>
                <p className="subtitle">
                  Guide a growing society through famine, invention, unrest, and ambition. Every turn pushes the same old question:
                  survive now, or build something larger than the current complaint.
                </p>
              </div>
              <div className={`status-banner ${banner.tone}`}>
                <strong>{banner.title}</strong>
                <div>{banner.body}</div>
              </div>
            </div>
            <div className="meta-strip">
              <div className="meta-pill">
                Era <strong>{state.developmentStage}</strong>
              </div>
              <div className="meta-pill">
                Year <strong>{state.year}</strong>
              </div>
              <div className="meta-pill">
                Turn <strong>{state.turn}</strong>
              </div>
              <div className="meta-pill">
                Tech Level <strong>{state.technologyLevel}</strong>
              </div>
              <div className="meta-pill">
                Legacy <strong>{state.legacyScore}</strong>
              </div>
              <div className="meta-pill">
                Next Stage <strong>{STAGES[Math.min(stageIndexFromLabel(stage.label) + 1, STAGES.length - 1)].label}</strong>
              </div>
            </div>
          </section>
        );
      }

      function ControlPanel({ state, dispatch }) {
        const canStart = state.status === "menu";
        const canPause = state.status === "running";
        const canResume = state.status === "paused";
        const canStep = state.status !== "running" && state.status !== "won" && state.status !== "lost";
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Control Panel</h2>
                <p>Hybrid pacing: auto-run one turn per second or step manually when you need precision.</p>
              </div>
              <div className="points-pill">Policies Used: {totalPolicyPoints(state.policies)}/{POLICY_POINT_CAP}</div>
            </div>
            <div className="control-row">
              <button id="start-btn" className="btn-primary" disabled={!canStart} onClick={() => dispatch({ type: "START_GAME" })}>
                Start
              </button>
              <button id="pause-btn" className="btn-secondary" disabled={!canPause} onClick={() => dispatch({ type: "PAUSE_GAME" })}>
                Pause
              </button>
              <button id="resume-btn" className="btn-accent" disabled={!canResume} onClick={() => dispatch({ type: "RESUME_GAME" })}>
                Resume
              </button>
              <button id="step-btn" className="btn-secondary" disabled={!canStep} onClick={() => dispatch({ type: "STEP_TURN" })}>
                Next Turn
              </button>
              <button
                id="reset-btn"
                className="btn-danger"
                onClick={() => dispatch({ type: "RESET_GAME", seed: (Date.now() >>> 0) || 11 })}
              >
                Reset
              </button>
            </div>
            <div className="footer-note">
              Press <strong>F</strong> to toggle fullscreen. Manual stepping leaves the game paused so you can inspect each consequence.
            </div>
          </section>
        );
      }

      function ResourcePanel({ state, assets }) {
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Resource Ledger</h2>
                <p>Core stocks define whether growth becomes civilization or a cautionary note.</p>
              </div>
            </div>
            <div className="resource-grid">
              {RESOURCE_META.map((item) => {
                const deltaKey = `${item.key}Delta`;
                const delta = state.lastBreakdown[deltaKey] || 0;
                return (
                  <article className="resource-card" key={item.key}>
                    <img src={assets[item.icon]?.uri} alt={item.label} />
                    <div>
                      <h4>{item.label}</h4>
                      <div className="resource-value">{Math.round(state[item.key])}</div>
                      <div className={`delta ${delta > 0 ? "good" : delta < 0 ? "bad" : ""}`}>Last turn {formatSigned(delta)}</div>
                    </div>
                  </article>
                );
              })}
            </div>
          </section>
        );
      }

      function StatsPanel({ state, assets }) {
        const stageIdx = stageIndexFromLabel(state.developmentStage);
        const nextStage = STAGES[Math.min(stageIdx + 1, STAGES.length - 1)];
        const currentStage = STAGES[stageIdx] || STAGES[0];
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Civic Metrics</h2>
                <p>These are the quiet variables that decide whether a good harvest becomes a durable society.</p>
              </div>
            </div>
            <div className="meter-grid">
              {METRIC_META.map((metric) => (
                <div className="meter-row" key={metric.key}>
                  <div className="meter-name">
                    <img className="icon-badge" src={assets[metric.icon]?.uri} alt={metric.label} />
                    <span>{metric.label}</span>
                  </div>
                  <div className="meter-bar">
                    <div
                      className="meter-fill"
                      style={{
                        width: `${clamp(state[metric.key], 0, 100)}%`,
                        background: `linear-gradient(90deg, ${metric.color}, ${meterTone(state[metric.key])})`,
                      }}
                    />
                  </div>
                  <strong>{Math.round(state[metric.key])}</strong>
                </div>
              ))}
            </div>
            <div className="legend-row">
              <div className="legend-pill">
                <span className="legend-swatch" style={{ background: "#d59f4d" }} />
                {currentStage.label} requirements met
              </div>
              <div className="legend-pill">
                <span className="legend-swatch" style={{ background: "#4f8e5d" }} />
                Next: {nextStage.label} needs Pop {nextStage.pop}, Industry {nextStage.industry}, Tech {nextStage.tech}
              </div>
            </div>
          </section>
        );
      }

      function PolicyPanel({ state, dispatch }) {
        const spent = totalPolicyPoints(state.policies);
        const remaining = POLICY_POINT_CAP - spent;
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Policy Cabinet</h2>
                <p>Each policy level is a permanent nudge each turn. The tradeoff is the point, not an accident.</p>
              </div>
              <div className="points-pill">Free Points: {remaining}</div>
            </div>
            <div className="policy-list">
              {Object.entries(POLICY_DEFS).map(([key, policy]) => (
                <div className="policy-row" key={key}>
                  <div className="policy-topline">
                    <div>
                      <div className="policy-label">{policy.label}</div>
                      <div className="minor-copy">{policy.summary}</div>
                    </div>
                    <div className="points-pill">Level {state.policies[key]}</div>
                  </div>
                  <div className="policy-controls">
                    <button
                      className="btn-secondary"
                      onClick={() => dispatch({ type: "SET_POLICY", key, delta: -1 })}
                      disabled={state.policies[key] <= 0}
                      title={`Lower ${policy.label}`}
                    >
                      -
                    </button>
                    <div className="policy-level">{state.policies[key]}</div>
                    <button
                      className="btn-secondary"
                      onClick={() => dispatch({ type: "SET_POLICY", key, delta: 1 })}
                      disabled={state.policies[key] >= 3 || remaining <= 0}
                      title={`Raise ${policy.label}`}
                    >
                      +
                    </button>
                    <div className="minor-copy" style={{ flex: 1 }}>{policy.detail}</div>
                  </div>
                </div>
              ))}

      function ProgressVisualization({ state }) {
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Historical Trends</h2>
                <p>Recent turns only. Long empires deserve archivists; you have sparklines.</p>
              </div>
            </div>
            <div className="history-grid">
              {HISTORY_META.map((item) => {
                const values = state.history[item.key] || [];
                return (
                  <div className="spark-card" key={item.key}>
                    <div className="policy-topline">
                      <strong>{item.label}</strong>
                      <span>{values[values.length - 1] ?? 0}</span>
                    </div>
                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-label={item.label}>
                      <path d="M0 86H100" stroke="rgba(17,37,56,0.1)" strokeWidth="1.8" />
                      <path d={`M${sparkPoints(values)}`} fill="none" stroke={item.color} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>

      function EventLog({ entries, assets }) {
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Event Log</h2>

            <div className="event-list">
              {entries.map((entry) => (
                <article className="event-item" key={entry.id}>
                  <img className="icon-badge" src={assets[entry.icon]?.uri} alt={entry.title} />
                  <div>
                    <h4>{entry.title}</h4>
                    <div className="event-meta">
                      Year {entry.year} · Turn {entry.turn}
                    </div>
                    <div className="event-body">{entry.detail}</div>
                    <span className="event-tag">{entry.tag}</span>
                  </div>
                </article>
              ))}
            </div>
          </section>

      function drawSprite(ctx, asset, x, y, width, height, alpha = 1) {
        if (!asset?.image) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.drawImage(asset.image, x, y, width, height);
        ctx.restore();
      }

      function CanvasWorld({ state, assets }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas || !assets.citizen) return;
          const ctx = canvas.getContext("2d");
          const width = canvas.width;
          const height = canvas.height;
          const stage = STAGES.find((entry) => entry.label === state.developmentStage) || STAGES[0];
          const crisis = state.unrest > 55 || state.stability < 45 || state.health < 35;
          const prosperity = state.happiness > 72 && state.health > 68 && state.environment > 50;

          ctx.clearRect(0, 0, width, height);

          const sky = ctx.createLinearGradient(0, 0, 0, height * 0.55);
          sky.addColorStop(0, state.environment > 45 ? "#d2ecf5" : "#d4c7bf");
          sky.addColorStop(1, state.environment > 45 ? "#87b6c8" : "#a99a90");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, width, height);

          const sunX = width - 120;
          const sunY = 90;
          const sun = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 80);
          sun.addColorStop(0, prosperity ? "rgba(255,242,172,0.92)" : "rgba(250,224,157,0.8)");
          sun.addColorStop(1, "rgba(255,227,120,0)");
          ctx.fillStyle = sun;
          ctx.beginPath();
          ctx.arc(sunX, sunY, 80, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = state.environment > 38 ? "#7f9d67" : "#857156";
          ctx.fillRect(0, height * 0.46, width, height * 0.54);
          ctx.fillStyle = state.environment > 38 ? "#5c7d59" : "#675b48";
          ctx.beginPath();
          ctx.moveTo(0, height * 0.62);
          ctx.quadraticCurveTo(width * 0.22, height * 0.55, width * 0.38, height * 0.6);
          ctx.quadraticCurveTo(width * 0.56, height * 0.68, width * 0.78, height * 0.58);
          ctx.quadraticCurveTo(width * 0.9, height * 0.52, width, height * 0.62);
          ctx.lineTo(width, height);
          ctx.lineTo(0, height);
          ctx.closePath();
          ctx.fill();

          drawSprite(ctx, assets.riverStrip, 0, height - 186, width * 0.42, 165, 0.94);

          const fieldAsset =
            state.environment > 65 ? assets.fertileField : state.environment > 35 ? assets.normalField : assets.witheredField;
          const forestAsset = state.environment > 50 ? assets.healthyForest : assets.damagedForest;
          const homeAsset = state.population > 135 ? assets.apartmentBlock : state.population > 58 ? assets.house : assets.hut;
          const hubAsset = assets[stage.hub];

          const homeCount = Math.max(2, Math.round(state.population / 18));
          const farmCount = Math.max(2, state.policies.agriculture + Math.round(state.food / 95));
          const industryCount = Math.max(1, state.policies.industry + Math.round(state.industry / 100));
          const knowledgeCount = Math.max(1, state.policies.education + state.policies.research + Math.round(state.knowledge / 110));
          const civicCount = Math.max(1, state.policies.health + state.policies.welfare);

          const farmStartX = 40;
          for (let i = 0; i < farmCount; i++) {
            drawSprite(ctx, fieldAsset, farmStartX + i * 98, height - 190 + (i % 2) * 12, 110, 84);
          }
          drawSprite(ctx, assets.farmPlot, farmStartX + 36, height - 224, 132, 92);

          for (let i = 0; i < 3; i++) {
            drawSprite(ctx, forestAsset, 28 + i * 82, 210 + (i % 2) * 18, 96, 78, state.environment > 30 ? 1 : 0.82);
          }

          if (state.environment < 45 || state.policies.industry >= 2) {
            drawSprite(ctx, assets.pollutedGround, width * 0.56, height - 144, 220, 92, 0.82);
          }

          const structureY = height - 242;
          for (let i = 0; i < homeCount; i++) {
            drawSprite(ctx, homeAsset, 240 + i * 66, structureY + ((i % 3) * 10), 86, 72);
          }

          drawSprite(ctx, hubAsset, width * 0.44, height - 295, 260, 190);

          const industryAssets = [assets.workshop, assets.factory, assets.granary, assets.waterTower];
          for (let i = 0; i < industryCount; i++) {
            const asset = industryAssets[i % industryAssets.length];
            drawSprite(ctx, asset, width * 0.65 + i * 58, height - 228 + (i % 2) * 8, 92, 84);
          }

          const knowledgeAssets = [assets.school, assets.library, assets.lab, assets.observatory];
          for (let i = 0; i < knowledgeCount; i++) {
            const asset = knowledgeAssets[i % knowledgeAssets.length];
            drawSprite(ctx, asset, width * 0.44 + i * 52, height - 160 - (i % 2) * 12, 88, 76);
          }

          const civicAssets = [assets.clinic, assets.hospital, assets.park, assets.watchtower, assets.solarField];
          for (let i = 0; i < civicCount; i++) {
            const asset = civicAssets[i % civicAssets.length];
            drawSprite(ctx, asset, 160 + i * 90, height - 118 - (i % 2) * 8, 96, 80);
          }

          if (state.technologyLevel >= 8) {
            drawSprite(ctx, assets.solarField, width - 280, height - 145, 170, 92);
          }

          const citizenCount = Math.min(12, Math.max(3, Math.round(state.population / 20)));
          for (let i = 0; i < citizenCount; i++) {
            const x = 250 + ((i * 61) % 430);
            const y = height - 72 - ((i % 3) * 12);
            drawSprite(ctx, assets.citizen, x, y, 28, 28, 0.92);
          }

          if (state.policies.industry >= 2 || state.environment < 42) {
            const smokeCount = Math.max(1, Math.round(state.policies.industry + (50 - state.environment) / 24));
            for (let i = 0; i < smokeCount; i++) {
              drawSprite(ctx, assets.smokePlume, width * 0.7 + i * 26, 90 + i * 4, 82, 82, 0.7);
            }
          }

          if (crisis) {
            drawSprite(ctx, assets.stormCloud, 40, 30, 180, 120, 0.88);
            drawSprite(ctx, assets.eventUnrest, width - 140, 24, 92, 92, 0.92);
            ctx.fillStyle = "rgba(166,61,51,0.12)";
            ctx.fillRect(0, 0, width, height);
          }

          if (prosperity) {
            drawSprite(ctx, assets.eventHarvest, width - 152, 28, 96, 96, 0.95);
            ctx.strokeStyle = "rgba(255,247,194,0.52)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, height - 40);
            for (let x = 0; x <= width; x += 40) {
              ctx.lineTo(x, height - 34 - Math.sin(x / 60) * 4);
            }
            ctx.stroke();
          }
        }, [state, assets]);

        return (
          <section className="panel world-panel">
            <div className="panel-header">
              <div>
                <h2>World Canvas</h2>
                <p>The map reflects the real simulation state: density, smoke, ecology, prosperity, and technological unlocks all come from the reducer.</p>
              </div>
            </div>
            <div className="world-wrap">
              <canvas ref={canvasRef} width="960" height="540" />
              <div className="world-overlay">
                <div className="world-chip">Hub: {state.developmentStage}</div>
                <div className="world-chip">Effects: {state.activeEffects.length ? state.activeEffects.map((effect) => effect.name).join(", ") : "None"}</div>
              </div>
            </div>
            <div className="legend-row">
              <div className="legend-pill">
                <span className="legend-swatch" style={{ background: "#4f8e5d" }} />
                Prosperity = cleaner land, brighter light, stronger morale
              </div>
              <div className="legend-pill">
                <span className="legend-swatch" style={{ background: "#a63d33" }} />
                Crisis = smoke, storm tint, unrest markers, and harsher terrain
              </div>
            </div>
          </section>
        );
      }

      function App() {
        const [state, dispatch] = useReducer(reducer, undefined, () => createInitialState());
        const [assets, setAssets] = useState({});
        const latestStateRef = useRef(state);
        const virtualAccumulatorRef = useRef(0);
        const shellRef = useRef(null);

        useEffect(() => {
          latestStateRef.current = state;
        }, [state]);

        useEffect(() => {
          let cancelled = false;
          loadAssetPack().then((pack) => {
            if (cancelled) return;
            setAssets(pack);
            dispatch({ type: "ASSETS_READY" });
          });
          return () => {
            cancelled = true;
          };
        }, []);

        useEffect(() => {
          if (state.status !== "running") return undefined;
          const timer = window.setInterval(() => {
            dispatch({ type: "STEP_TURN" });
          }, TURN_INTERVAL_MS);
          return () => window.clearInterval(timer);
        }, [state.status]);

        useEffect(() => {
          // Deterministic browser hooks used by automated game checks.
          window.render_game_to_text = () => JSON.stringify(getWorldSnapshot(latestStateRef.current), null, 2);
          window.advanceTime = (ms) => {
            virtualAccumulatorRef.current += ms;
            while (
              virtualAccumulatorRef.current >= TURN_INTERVAL_MS &&
              latestStateRef.current.status === "running"
            ) {
              virtualAccumulatorRef.current -= TURN_INTERVAL_MS;
              dispatch({ type: "STEP_TURN" });
            }
            return Promise.resolve();
          };
          return () => {
            delete window.render_game_to_text;
            delete window.advanceTime;
          };
        }, []);

        useEffect(() => {
          function onKeyDown(event) {
            if (event.key.toLowerCase() !== "f") return;
            const host = shellRef.current;
            if (!host) return;
            if (document.fullscreenElement) {
              document.exitFullscreen();
            } else if (host.requestFullscreen) {
              host.requestFullscreen();
            }
          }

          window.addEventListener("keydown", onKeyDown);
          return () => window.removeEventListener("keydown", onKeyDown);
        }, []);

        const ready = state.assetsReady && Object.keys(assets).length > 0;
        const snapshot = getWorldSnapshot(state);

        if (!ready) {
          return (
            <div className="app-shell">
              <section className="header-card">
                <h1>Civilization Simulator Lite</h1>
                <p className="subtitle">Loading the asset registry and preparing the machinery of history.</p>
              </section>
            </div>
          );
        }

        return (
          <div className="app-shell" ref={shellRef}>
            <GameHeader state={state} />
            <div className="main-grid">
              <div className="left-column">
                <CanvasWorld state={state} assets={assets} />
                <ControlPanel state={state} dispatch={dispatch} />
                <ResourcePanel state={state} assets={assets} />
                <ProgressVisualization state={state} />
              </div>
              <div className="right-column">
                <StatsPanel state={state} assets={assets} />
                <PolicyPanel state={state} dispatch={dispatch} />
                <EventLog entries={state.eventLog} assets={assets} />
                <section className="panel">
                  <div className="panel-header">
                    <div>
                      <h2>Simulation Notes</h2>
                      <p>Deterministic turn logic with weighted events, bounded variables, and replayable seeded randomness.</p>
                    </div>
                  </div>
                  <div className="minor-copy">
                    <strong>Snapshot</strong>
                    <pre style={{ margin: "10px 0 0", whiteSpace: "pre-wrap", fontSize: "0.8rem", lineHeight: 1.45 }}>
{JSON.stringify(snapshot, null, 2)}
                    </pre>
                  </div>
                </section>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
