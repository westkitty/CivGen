      function getVillageModel(state) {
        const preview = calculateTurnPreview(state);
        const stageIndex = Math.max(0, stageIndexFromLabel(state.developmentStage));
        const currentStage = STAGES[stageIndex] || STAGES[0];
        const nextStage = STAGES[Math.min(stageIndex + 1, STAGES.length - 1)];
        const homeCount = Math.max(2, Math.round(state.population / 18));
        const farmCount = Math.max(2, state.policies.agriculture + Math.round(state.food / 95));
        const industryCount = Math.max(1, state.policies.industry + Math.round(state.industry / 100));
        const knowledgeCount = Math.max(1, state.policies.education + state.policies.research + Math.round(state.knowledge / 110));
        const civicCount = Math.max(1, state.policies.health + state.policies.welfare);
        const workforce = Math.max(6, Math.round(state.population * 0.58));
        const weights = {
          farmers: 2 + state.policies.agriculture,
          makers: 2 + state.policies.industry,
          scholars: 1 + state.policies.education + state.policies.research,
          caretakers: 1 + state.policies.health + state.policies.welfare,
          guards: Math.max(0, state.policies.security),
        };
        const weightTotal = Object.values(weights).reduce((sum, value) => sum + value, 0);
        const assignments = Object.fromEntries(
          Object.entries(weights).map(([key, value]) => [key, Math.floor((workforce * value) / weightTotal)])
        );
        const assigned = Object.values(assignments).reduce((sum, value) => sum + value, 0);
        const idleWorkers = Math.max(0, workforce - assigned);
        const housingCap = currentStage.pop + 22 + stageIndex * 10 + (state.completedProjects.housing || 0) * 10;
        const housingUsed = state.population;
        const housingShortage = housingUsed >= housingCap;
        const garrison = assignments.guards + (state.completedProjects.guardpost || 0) * 2;
        const defenseScore = Math.round(state.stability * 0.45 + state.policies.security * 10 + garrison * 2 - state.unrest * 0.28);
        const currentProject = state.projectQueue[0] ? { ...state.projectQueue[0], def: PROJECT_DEFS[state.projectQueue[0].key] } : null;
        const projectTurnsRemaining = currentProject && preview.projectGain > 0
          ? Math.max(1, Math.ceil((currentProject.def.cost - currentProject.progress) / preview.projectGain))
          : null;
        const growthTurns = preview.growthPressure > 0 ? turnsToWhole(preview.growthPressure) : null;

        const alerts = [];
        if (preview.foodNet < 0 || state.food < 25) {
          alerts.push({
            key: "food",
            severity: preview.foodNet < -6 || state.food < 10 ? "critical" : "warning",
            icon: "!",
            title: preview.foodNet < 0 ? "Food deficit" : "Granaries running thin",
            detail: preview.foodNet < 0
              ? `Food is trending ${formatSigned(preview.foodNet)} per turn. Growth will stall or reverse.`
              : `Only ${Math.round(state.food)} food remains in storage.`,
            action: "Shift policy toward Agriculture or queue Granary Expansion.",
          });
        }
        if (housingShortage) {
          alerts.push({
            key: "housing",
            severity: "warning",
            icon: "HOME",
            title: "Housing shortage",
            detail: `Population is at ${housingUsed}/${housingCap} housing. Growth is blocked.`,
            action: "Queue Housing Quarter or reduce short-term migration pressure.",
          });
        }
        if (idleWorkers > 2) {
          alerts.push({
            key: "idle",
            severity: "warning",
            icon: "IDLE",
            title: "Idle workers",
            detail: `${idleWorkers} workers are unassigned relative to current district demand.`,
            action: "Increase a policy focus or start a civic project.",
          });
        }
        if (state.unrest > 55 || state.stability < 42) {
          alerts.push({
            key: "unrest",
            severity: "critical",
            icon: "WARN",
            title: "Instability",
            detail: `Unrest is ${Math.round(state.unrest)} and stability is ${Math.round(state.stability)}.`,
            action: "Increase Security or Welfare before production collapses further.",
          });
        }
        if (defenseScore < 36) {
          alerts.push({
            key: "defense",
            severity: "warning",
            icon: "DEF",
            title: "Weak defense",
            detail: garrison > 0 ? `Guard presence is thin at ${garrison}.` : "No meaningful garrison is present.",
            action: "Raise Security or queue a Guard Post.",
          });
        }
        if (!state.projectQueue.length) {
          alerts.push({
            key: "queue",
            severity: "warning",
            icon: "+",
            title: "No production queued",
            detail: "Construction capacity exists, but the settlement has no active project.",
            action: "Queue a project from the sticky action bar.",
          });
        }

        const bottlenecks = [];
        if (preview.foodNet < 0) bottlenecks.push(`Food trend ${formatSigned(preview.foodNet)} per turn`);
        if (housingShortage) bottlenecks.push(`Housing full at ${housingUsed}/${housingCap}`);
        if (state.environment < 38) bottlenecks.push(`Environment only ${Math.round(state.environment)}`);
        if (state.unrest > 45) bottlenecks.push(`Unrest elevated at ${Math.round(state.unrest)}`);
        if (preview.industryNet < 0) bottlenecks.push(`Industry upkeep exceeds output by ${Math.abs(preview.industryNet)}`);

        const buildings = {
          food: [
            {
              key: "farms",
              name: "Farmsteads",
              icon: "farmPlot",
              count: farmCount,
              status: preview.foodNet >= 0 ? "good" : "bad",
              detail: preview.foodNet >= 0 ? "Active: fields are covering current demand." : "Strained: food demand exceeds field output.",
            },
            {
              key: "granary",
              name: "Granary",
              icon: "granary",
              count: 1 + (state.completedProjects.granary || 0),
              status: state.food >= 30 ? "good" : "warn",
              detail: state.food >= 30 ? "Active: reserve stores are stable." : "Low reserve: food stockpile is nearly exhausted.",
            },
            {
              key: "waterworks",
              name: "Waterworks",
              icon: "waterTower",
              count: state.completedProjects.waterworks || 0,
              status: (state.completedProjects.waterworks || 0) > 0 ? "good" : "warn",
              detail: (state.completedProjects.waterworks || 0) > 0 ? "Active: health support is in place." : "Not built yet: water support remains basic.",
            },
          ],
          housing: [
            {
              key: "homes",
              name: homeCount > 5 ? "Residential Blocks" : homeCount > 3 ? "Houses" : "Huts",
              icon: state.population > 135 ? "apartmentBlock" : state.population > 58 ? "house" : "hut",
              count: homeCount,
              status: housingShortage ? "bad" : "good",
              detail: housingShortage ? "Growth blocked — housing full." : "Occupied but stable.",
            },
            {
              key: "housingQuarter",
              name: "Housing Quarter",
              icon: "house",
              count: state.completedProjects.housing || 0,
              status: (state.completedProjects.housing || 0) > 0 ? "good" : "warn",
              detail: (state.completedProjects.housing || 0) > 0 ? "Expanded housing capacity is online." : "No recent housing expansion.",
            },
          ],
          economy: [
            {
              key: "workshops",
              name: industryCount >= 3 ? "Factory Line" : "Workshops",
              icon: industryCount >= 3 ? "factory" : "workshop",
              count: industryCount,
              status: preview.industryNet > 0 ? "good" : "warn",
              detail: preview.industryNet > 0 ? "Active: industry is feeding construction." : "Tight: upkeep is eating into output.",
            },
            {
              key: "solar",
              name: "Solar Field",
              icon: "solarField",
              count: state.completedProjects.solar || (state.technologyLevel >= 8 ? 1 : 0),
              status: state.technologyLevel >= 8 ? "good" : "warn",
              detail: state.technologyLevel >= 8 ? "Operational: long-horizon efficiency is improving." : "Unavailable until late development.",
            },
          ],
          knowledge: [
            {
              key: "schools",
              name: state.technologyLevel >= 6 ? "Laboratories" : "Schools",
              icon: state.technologyLevel >= 6 ? "lab" : "school",
              count: knowledgeCount,
              status: state.policies.education + state.policies.research >= 2 ? "good" : "warn",
              detail: state.policies.education + state.policies.research >= 2 ? "Active: staffed and productive." : "Underfocused: knowledge quarter wants more support.",
            },
            {
              key: "library",
              name: state.technologyLevel >= 7 ? "Observatory" : "Library",
              icon: state.technologyLevel >= 7 ? "observatory" : "library",
              count: state.technologyLevel >= 3 ? 1 : 0,
              status: state.technologyLevel >= 3 ? "good" : "warn",
              detail: state.technologyLevel >= 3 ? "Open and compounding knowledge output." : "Not yet unlocked by development.",
            },
          ],
          civic: [
            {
              key: "care",
              name: state.health >= 72 ? "Hospital Network" : "Clinic",
              icon: state.health >= 72 ? "hospital" : "clinic",
              count: civicCount,
              status: state.health >= 50 ? "good" : "warn",
              detail: state.health >= 50 ? "Active: care system is holding." : "Strained: public health is slipping.",
            },
            {
              key: "commons",
              name: "Commons & Parks",
              icon: "park",
              count: Math.max(1, state.policies.welfare),
              status: state.happiness >= 50 ? "good" : "warn",
              detail: state.happiness >= 50 ? "Active: morale spaces are helping." : "Thin support: happiness remains weak.",
            },
          ],
          defense: [
            {
              key: "watch",
              name: "Civic Watch",
              icon: "watchtower",
              count: Math.max(0, garrison),
              status: defenseScore >= 36 ? "good" : "bad",
              detail: defenseScore >= 36 ? "Staffed and steady." : garrison > 0 ? "Understaffed." : "No garrison.",
            },
          ],
        };

        const compare = [
          {
            key: "population",
            label: "Population",
            current: Math.round(state.population),
            previous: Math.round(Math.max(0, state.population - state.lastBreakdown.populationDelta)),
            peak: Math.round(Math.max(...state.history.population)),
          },
          {
            key: "food",
            label: "Food Stockpile",
            current: Math.round(state.food),
            previous: Math.round(state.food - state.lastBreakdown.foodDelta),
            peak: Math.round(Math.max(...state.history.food)),
          },
          {
            key: "knowledge",
            label: "Knowledge",
            current: Math.round(state.knowledge),
            previous: Math.round(state.knowledge - state.lastBreakdown.knowledgeDelta),
            peak: Math.round(Math.max(...state.history.knowledge)),
          },
          {
            key: "legacy",
            label: "Legacy",
            current: Math.round(state.legacyScore),
            previous: Math.round(state.history.legacyScore[state.history.legacyScore.length - 2] || 0),
            peak: Math.round(Math.max(...state.history.legacyScore)),
          },
        ];

        const village = {
          name: state.settlementName,
          preview,
          stageIndex,
          currentStage,
          nextStage,
          homeCount,
          farmCount,
          industryCount,
          knowledgeCount,
          civicCount,
          workforce,
          assignments,
          idleWorkers,
          housingCap,
          housingUsed,
          housingShortage,
          garrison,
          defenseScore,
          knowledgeQuarterBlocked: state.policies.education + state.policies.research < 2,
          industryStrained: preview.industryNet < 0 || state.unrest > 50,
          projectTurnsRemaining,
          growthTurns,
          currentProject,
          alerts,
          bottlenecks,
          buildings,
          compare,
        };

        village.tileZones = buildTileZones(state, village);
        village.primaryRecommendation = alerts[0]?.action ||
          (currentProject
            ? `Keep ${currentProject.def.label} moving for ${projectTurnsRemaining} more ${projectTurnsRemaining === 1 ? "turn" : "turns"}.`
            : `Queue ${preview.foodNet < 0 ? "Granary Expansion" : preview.industryNet < 0 ? "Workshop District" : "Schoolhouse Charter"} next.`);
        village.whatsHappening = alerts[0]?.title || (currentProject ? `${currentProject.def.label} is underway.` : "The settlement is stable.");
        village.whyHappening =
          alerts[0]?.detail ||
          (currentProject
            ? `${currentProject.def.label} is consuming the settlement's available construction capacity.`
            : "No acute blocker is present, so the village is coasting on current policy settings.");
        return village;
      }

      function getWorldSnapshot(state) {
        const stage = STAGES.find((entry) => entry.label === state.developmentStage) || STAGES[0];
        const homes = Math.max(2, Math.round(state.population / 18));
        const farms = Math.max(2, state.policies.agriculture + Math.round(state.food / 90));
        const industrialSites = Math.max(1, state.policies.industry + Math.round(state.industry / 100));
        const civicSites = Math.max(1, state.policies.education + state.policies.health + Math.round(state.knowledge / 120));
        return {
          settlementName: state.settlementName,
          mode: state.status,
          turn: state.turn,
          year: state.year,
          stage: state.developmentStage,
          technologyLevel: state.technologyLevel,
          resources: {
            food: state.food,
            industry: state.industry,
            knowledge: state.knowledge,
            population: state.population,
            happiness: state.happiness,
            health: state.health,
            environment: state.environment,
            stability: state.stability,
            unrest: state.unrest,
            legacyScore: state.legacyScore,
          },
          activeEffects: state.activeEffects.map((effect) => ({
            name: effect.name,
            turnsLeft: effect.turnsLeft,
          })),
          projectQueue: state.projectQueue.map((item) => ({
            key: item.key,
            progress: item.progress,
          })),
          world: {
            origin: "Canvas origin is top-left; x grows right, y grows down.",
            hub: stage.hub,
            homes,
            farms,
            industrialSites,
            civicSites,
            unrestSignals: state.unrest > 55 ? 2 : 0,
            smokeSignals: state.policies.industry + Math.max(0, 50 - state.environment) / 25,
          },
        };
      }

      function getStatusBanner(state) {
        if (state.status === "won") {
          return { tone: "prosper", title: "Victory", body: state.victoryText };
        }
        if (state.status === "lost") {
          return { tone: "crisis", title: "Collapse", body: state.victoryText };
        }
        if (state.unrest > 60 || state.stability < 40 || state.health < 30) {
          return { tone: "crisis", title: "Crisis", body: state.statusText };
        }
        if (state.happiness > 70 && state.health > 70 && state.environment > 50) {
          return { tone: "prosper", title: "Prosperity", body: state.statusText };
        }
        return { tone: "", title: "Status", body: state.statusText };
      }

      function meterTone(value) {
        if (value >= 70) return "#4f8e5d";
        if (value >= 40) return "#d59f4d";
        return "#a63d33";
      }

      function sparkPoints(values) {
        if (!values.length) return "";
        const min = Math.min(...values);
        const max = Math.max(...values);
        return values
          .map((value, index) => {
            const x = values.length === 1 ? 0 : (index / (values.length - 1)) * 100;
            const y = max === min ? 50 : 100 - ((value - min) / (max - min)) * 100;
            return `${x},${y}`;
          })
          .join(" ");
      }

      function GameHeader({ state }) {
        const stage = STAGES.find((entry) => entry.label === state.developmentStage) || STAGES[0];
        const banner = getStatusBanner(state);
        return (
          <section className="header-card">
            <div className="title-row">
              <div>
                <h1>Civilization Simulator Lite</h1>
                <p className="subtitle">
                  Guide a growing society through famine, invention, unrest, and ambition. Every turn pushes the same old question:
                  survive now, or build something larger than the current complaint.
                </p>
              </div>
              <div className={`status-banner ${banner.tone}`}>
                <strong>{banner.title}</strong>
                <div>{banner.body}</div>
              </div>
            </div>
            <div className="meta-strip">
              <div className="meta-pill">
                Era <strong>{state.developmentStage}</strong>
              </div>
              <div className="meta-pill">
                Year <strong>{state.year}</strong>
              </div>
              <div className="meta-pill">
                Turn <strong>{state.turn}</strong>
              </div>
              <div className="meta-pill">
                Tech Level <strong>{state.technologyLevel}</strong>
              </div>
              <div className="meta-pill">
                Legacy <strong>{state.legacyScore}</strong>
              </div>
              <div className="meta-pill">
                Next Stage <strong>{STAGES[Math.min(stageIndexFromLabel(stage.label) + 1, STAGES.length - 1)].label}</strong>
              </div>
            </div>
          </section>
        );
      }

      function ControlPanel({ state, dispatch }) {
        const canStart = state.status === "menu";
        const canPause = state.status === "running";
        const canResume = state.status === "paused";
        const canStep = state.status !== "running" && state.status !== "won" && state.status !== "lost";
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Control Panel</h2>
                <p>Hybrid pacing: auto-run one turn per second or step manually when you need precision.</p>
              </div>
              <div className="points-pill">Policies Used: {totalPolicyPoints(state.policies)}/{POLICY_POINT_CAP}</div>
            </div>
            <div className="control-row">
              <button id="start-btn" className="btn-primary" disabled={!canStart} onClick={() => dispatch({ type: "START_GAME" })}>
                Start
              </button>
              <button id="pause-btn" className="btn-secondary" disabled={!canPause} onClick={() => dispatch({ type: "PAUSE_GAME" })}>
                Pause
              </button>
              <button id="resume-btn" className="btn-accent" disabled={!canResume} onClick={() => dispatch({ type: "RESUME_GAME" })}>
                Resume
              </button>
              <button id="step-btn" className="btn-secondary" disabled={!canStep} onClick={() => dispatch({ type: "STEP_TURN" })}>
                Next Turn
              </button>
              <button
                id="reset-btn"
                className="btn-danger"
                onClick={() => dispatch({ type: "RESET_GAME", seed: (Date.now() >>> 0) || 11 })}
              >
                Reset
              </button>
            </div>
            <div className="footer-note">
              Press <strong>F</strong> to toggle fullscreen. Manual stepping leaves the game paused so you can inspect each consequence.
            </div>
          </section>
        );
      }

      function VillageSummaryStrip({ state, village }) {
        const growthTrend = getTrendDescriptor(village.preview.growthPressure, "Growing", "Shrinking", "Flat");
        const foodTrend = getTrendDescriptor(village.preview.foodNet, "Surplus", "Deficit", "Balanced");
        const industryTrend = getTrendDescriptor(village.preview.industryNet, "Building", "Stalled", "Balanced");
        const stabilityTrend = getTrendDescriptor(state.stability - state.unrest / 2, "Steady", "Volatile", "Mixed");
        const cards = [
          {
            label: "Population",
            value: Math.round(state.population),
            subvalue: village.growthTurns ? `+1 in ${village.growthTurns} turns` : village.housingShortage ? "Growth blocked — housing full" : "Population stable",
            trend: growthTrend,
          },
          {
            label: "Food",
            value: Math.round(state.food),
            subvalue: `${formatPerTurn(village.preview.foodNet)} net`,
            trend: foodTrend,
          },
          {
            label: "Production",
            value: Math.round(state.industry),
            subvalue: `${formatPerTurn(village.preview.industryNet)} net`,
            trend: industryTrend,
          },
          {
            label: "Stability",
            value: Math.round(state.stability),
            subvalue: `Unrest ${Math.round(state.unrest)} · ${stabilityTrend.label}`,
            trend: stabilityTrend,
          },
        ];

        return (
          <div className="village-topbar">
            <div className="village-titlebar">
              <div>
                <div className="eyebrow">Settlement Inspector · Stage {state.developmentStage}</div>
                <h2 className="village-title">{state.settlementName}</h2>
                <div className="village-subtitle">
                  Turn {state.turn} · Year {state.year} · Tech {state.technologyLevel} · Next stage target {village.nextStage.label}
                </div>
              </div>
              <div className="focus-summary">
                <span className={`status-chip ${getStatusBanner(state).tone === "crisis" ? "bad" : getStatusBanner(state).tone === "prosper" ? "good" : "warn"}`}>
                  {getStatusBanner(state).tone === "crisis" ? "ALERT" : getStatusBanner(state).tone === "prosper" ? "GOOD" : "INFO"}
                  <span>{getStatusBanner(state).title}</span>
                </span>
                <div className="minor-copy">{state.statusText}</div>
              </div>
            </div>
            <div className="village-summary-grid">
              {cards.map((card) => (
                <div className="summary-card" key={card.label}>
                  <div className="summary-label">{card.label}</div>
                  <div className="summary-value">{card.value}</div>
                  <div className="summary-subvalue">{card.subvalue}</div>
                  <div className={`delta-pill ${card.trend.tone}`} style={{ marginTop: "8px" }}>
                    <span>{card.trend.icon}</span>
                    <span>{card.trend.label}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function VillageAlertStrip({ alerts }) {
        if (!alerts.length) {
          return (
            <div className="alert-strip">
                <div className="alert-item">
                  <div className="alert-icon">OK</div>
                  <div>
                    <strong>No urgent alerts</strong>
                  <div className="minor-copy">The settlement has no immediate crisis. That is as close to peace as this game gets.</div>
                </div>
                <span className="status-chip good">Stable</span>
              </div>
            </div>
          );
        }

        return (
          <div className="alert-strip">
            {alerts.map((alert) => (
              <div key={alert.key} className={`alert-item ${alert.severity}`}>
                <div className="alert-icon">{alert.icon}</div>
                <div>
                  <strong>{alert.title}</strong>
                  <div className="minor-copy">{alert.detail}</div>
                </div>
                <span className={`status-chip ${alert.severity === "critical" ? "bad" : "warn"}`}>{alert.action}</span>
              </div>
            ))}
          </div>
        );
      }

      function ResourcePanel({ state, assets, village }) {
        const rows = [
          {
            key: "food",
            label: "Food",
            icon: "iconFood",
            stock: state.food,
            yield: village.preview.foodProduction,
            upkeep: village.preview.foodDemand + village.preview.foodMaintenance,
            net: village.preview.foodNet,
          },
          {
            key: "industry",
            label: "Industry",
            icon: "iconIndustry",
            stock: state.industry,
            yield: village.preview.industryProduction,
            upkeep: village.preview.industryMaintenance,
            net: village.preview.industryNet,
          },
          {
            key: "knowledge",
            label: "Knowledge",
            icon: "iconKnowledge",
            stock: state.knowledge,
            yield: village.preview.knowledgeProduction,
            upkeep: 0,
            net: village.preview.knowledgeNet,
          },
        ];

        return (
          <section className="inspector-section">
            <div className="panel-header">
              <div>
                <h3>Overview</h3>
                <p>Stored stockpiles, per-turn output, and upkeep are split so motion is obvious instead of implied.</p>
              </div>
            </div>
            <div className="resource-split-grid">
              {rows.map((row) => {
                const trend = getTrendDescriptor(row.net, "Surplus", "Deficit", "Stable");
                return (
                  <div className="resource-split-card" key={row.key}>
                    <div className="split-header">
                      <div className="meter-name">
                        <img className="icon-badge" src={assets[row.icon]?.uri} alt={row.label} />
                        <div>
                          <strong>{row.label}</strong>
                          <div className="minor-copy">{row.label}: {Math.round(row.stock)} ({formatPerTurn(row.net)})</div>
                        </div>
                      </div>
                      <span className={`delta-pill ${trend.tone}`}>
                        <span>{trend.icon}</span>
                        <span>{trend.label}</span>
                      </span>
                    </div>
                    <div className="split-metrics">
                      <div className="split-metric">
                        <div className="metric-caption">Stored</div>
                        <div className="metric-value">{Math.round(row.stock)}</div>
                      </div>
                      <div className="split-metric">
                        <div className="metric-caption">Yield</div>
                        <div className="metric-value">{formatSigned(row.yield)}</div>
                      </div>
                      <div className="split-metric">
                        <div className="metric-caption">{row.key === "knowledge" ? "Gain" : "Upkeep"}</div>
                        <div className="metric-value">{row.key === "knowledge" ? formatSigned(row.net) : `-${Math.round(row.upkeep)}`}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </section>
        );
      }

      function StatsPanel({ state, assets, village }) {
        const currentStage = village.currentStage;
        const nextStage = village.nextStage;
        const defenseTone = village.defenseScore >= 55 ? "good" : village.defenseScore >= 36 ? "warn" : "bad";
        return (
          <section className="inspector-section">
            <div className="panel-header">
              <div>
                <h3>Population & Civic Load</h3>
                <p>Healthy villages explain growth, capacity, staffing, and risk in one place.</p>
              </div>
            </div>
            <div className="card-grid-2">
              <div className="info-card">
                <h3>Growth Outlook</h3>
                <div className="key-line">
                  <span>Population growth</span>
                  <strong>{village.growthTurns ? `+1 in ${village.growthTurns} turns` : village.housingShortage ? "Blocked" : "Flat"}</strong>
                </div>
                <div className="key-line">
                  <span>Housing</span>
                  <span className={`status-chip ${village.housingShortage ? "bad" : "good"}`}>
                    {village.housingShortage ? "FULL" : "CAPACITY"}
                  </span>
                </div>
                <div className="minor-copy" style={{ marginTop: "8px" }}>
                  {village.housingUsed}/{village.housingCap} housing used. {village.housingShortage ? "Growth is blocked by homes, not by demand." : "The village still has room to absorb more people."}
                </div>
              </div>
              <div className="info-card">
                <h3>Defense Readiness</h3>
                <div className="key-line">
                  <span>Defense score</span>
                  <strong>{village.defenseScore}</strong>
                </div>
                <div className="key-line">
                  <span>Garrison</span>
                  <span className={`status-chip ${defenseTone}`}>{village.garrison > 0 ? `${village.garrison} guard` : "No guard"}</span>
                </div>
                <div className="minor-copy" style={{ marginTop: "8px" }}>
                  {village.defenseScore >= 55 ? "The village can absorb trouble without immediately dissolving." : village.defenseScore >= 36 ? "Defense exists, but it is not exactly reassuring." : "Security is visibly thin."}
                </div>
              </div>
            </div>
            <div className="meter-grid">
              {METRIC_META.map((metric) => (
                <div className="meter-row" key={metric.key}>
                  <div className="meter-name">
                    <img className="icon-badge" src={assets[metric.icon]?.uri} alt={metric.label} />
                    <span>{metric.label}</span>
                  </div>
                  <div className="meter-bar">
                    <div
                      className="meter-fill"
                      style={{
                        width: `${clamp(state[metric.key], 0, 100)}%`,
                        background: `linear-gradient(90deg, ${metric.color}, ${meterTone(state[metric.key])})`,
                      }}
                    />
                  </div>
                  <strong>{Math.round(state[metric.key])}</strong>
                </div>
              ))}
            </div>
            <div className="legend-row">
              <div className="legend-pill">
                <span className="legend-swatch" style={{ background: "#d59f4d" }} />
                {currentStage.label} online
              </div>
              <div className="legend-pill">
                <span className="legend-swatch" style={{ background: "#4f8e5d" }} />
                Next: {nextStage.label} needs Pop {nextStage.pop}, Industry {nextStage.industry}, Tech {nextStage.tech}
              </div>
            </div>
          </section>
        );
      }

      function PolicyPanel({ state, dispatch }) {
        const spent = totalPolicyPoints(state.policies);
        const remaining = POLICY_POINT_CAP - spent;
        return (
          <section className="inspector-section">
            <div className="panel-header">
              <div>
                <h3>Policy Drivers</h3>
                <p>These sliders explain why the village is trending the way it is. They are not decorative guilt.</p>
              </div>
              <div className="points-pill">Free Points: {remaining}</div>
            </div>
            <div className="policy-list">
              {Object.entries(POLICY_DEFS).map(([key, policy]) => (
                <div className="policy-row" key={key}>
                  <div className="policy-topline">
                    <div>
                      <div className="policy-label">{policy.label}</div>
                      <div className="minor-copy">{policy.summary}</div>
                    </div>
                    <div className="points-pill">Level {state.policies[key]}</div>
                  </div>
                  <div className="policy-controls">
                    <button
                      className="btn-secondary"
                      onClick={() => dispatch({ type: "SET_POLICY", key, delta: -1 })}
                      disabled={state.policies[key] <= 0}
                      title={`Lower ${policy.label}`}
                    >
                      -
                    </button>
                    <div className="policy-level">{state.policies[key]}</div>
                    <button
                      className="btn-secondary"
                      onClick={() => dispatch({ type: "SET_POLICY", key, delta: 1 })}
                      disabled={state.policies[key] >= 3 || remaining <= 0}
                      title={`Raise ${policy.label}`}
                    >
                      +
                    </button>
                    <div className="minor-copy" style={{ flex: 1 }}>{policy.detail}</div>
                  </div>
                </div>
              ))}
            </div>
          </section>
        );
      }

      function ProductionPanel({ state, village, assets, dispatch, onFocusZone }) {
        const queue = state.projectQueue.map((item, index) => {
          const def = PROJECT_DEFS[item.key];
          const remaining = Math.max(0, def.cost - item.progress);
          const turns = village.preview.projectGain > 0 ? Math.max(1, Math.ceil(remaining / village.preview.projectGain)) : null;
          return { ...item, def, remaining, turns, progressPct: Math.min(100, (item.progress / def.cost) * 100), current: index === 0 };
        });

        return (
          <section className="inspector-section">
            <div className="panel-header">
              <div>
                <h3>Production Queue</h3>
                <p>Current project, progress, and turns remaining are explicit. No inferential archaeology required.</p>
              </div>
            </div>
            {!queue.length ? (
              <div className="empty-state">
                <strong>No production selected.</strong>
                <div className="minor-copy" style={{ marginTop: "8px" }}>
                  The settlement has no active project. Queue a granary, workshop, guard post, or schoolhouse from the action bar below.
                </div>
              </div>
            ) : (
              <div className="queue-list">
                {queue.map((item) => (
                  <div
                    key={item.id}
                    className={`queue-item ${item.current ? "is-current" : ""}`}
                    onMouseEnter={() => onFocusZone(item.def.zoneId)}
                    onMouseLeave={() => onFocusZone(null)}
                  >
                    <div className="queue-item-top">
                      <div className="meter-name">
                        <img className="icon-badge" src={assets[item.def.icon]?.uri} alt={item.def.label} />
                        <div>
                          <strong>{item.def.label}</strong>
                          <small>{item.current ? "Current project" : "Queued next"} · {item.def.effect}</small>
                        </div>
                      </div>
                      <span className={`status-chip ${item.current ? "good" : "warn"}`}>
                        {item.current ? "Active" : "Queued"}
                      </span>
                    </div>
                    <div className="queue-progress">
                      <span style={{ width: `${item.progressPct}%` }} />
                    </div>
                    <div className="key-line">
                      <span>{Math.round(item.progress)}/{item.def.cost} production</span>
                      <strong>{item.turns ? `${item.turns} turns left` : "Stalled"}</strong>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <div className="queue-actions">
              {Object.entries(PROJECT_DEFS).map(([key, def]) => (
                <button key={key} className="btn-secondary" disabled={state.projectQueue.length >= 4} onClick={() => dispatch({ type: "QUEUE_PROJECT", key })}>
                  Queue {def.label}
                </button>
              ))}
            </div>
          </section>
        );
      }

      function BuildingGroupsPanel({ village, assets, hoveredZoneId, setHoveredZoneId, selectedZoneId, setSelectedZoneId, visibleGroups }) {
        const groups = (visibleGroups || [
          { key: "food", label: "Food", zoneId: "fields" },
          { key: "housing", label: "Housing", zoneId: "homes" },
          { key: "economy", label: "Economy", zoneId: "industry" },
          { key: "knowledge", label: "Knowledge", zoneId: "scholar" },
          { key: "civic", label: "Infrastructure", zoneId: "civic" },
          { key: "defense", label: "Defense", zoneId: "civic" },
        ]);

        return (
          <section className="inspector-section">
            <div className="panel-header">
              <div>
                <h3>Buildings by Function</h3>
                <p>Entries expose operational state and inline bottlenecks instead of making you cross-reference the whole panel.</p>
              </div>
            </div>
            <div className="building-group-list">
              {groups.map((group) => (
                <div className="building-group" key={group.key}>
                  <div className="building-group-header">
                    <strong>{group.label}</strong>
                    <span className="minor-copy">{pluralize(village.buildings[group.key].reduce((sum, item) => sum + item.count, 0), "asset")}</span>
                  </div>
                  {(village.buildings[group.key] || []).length ? (
                    (village.buildings[group.key] || []).map((entry) => {
                      const chip = getStatusChip(entry.status);
                      const active = hoveredZoneId === group.zoneId || selectedZoneId === group.zoneId;
                      return (
                        <div
                          key={entry.key}
                          className={`building-row ${active ? "is-highlighted" : ""}`}
                          onMouseEnter={() => setHoveredZoneId(group.zoneId)}
                          onMouseLeave={() => setHoveredZoneId(null)}
                          onClick={() => setSelectedZoneId(group.zoneId)}
                        >
                          <div className="building-row-top">
                            <div className="meter-name">
                              <img className="icon-badge" src={assets[entry.icon]?.uri} alt={entry.name} />
                              <div>
                                <strong>{entry.name}</strong>
                                <small>{entry.detail}</small>
                              </div>
                            </div>
                            <div className="pill-row">
                              <span className={`status-chip ${chip.tone}`}>{chip.label}</span>
                              <span className="status-chip">Count {entry.count}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })
                  ) : (
                    <div className="empty-state">No buildings in this category yet.</div>
                  )}
                </div>
              ))}
            </div>
          </section>
        );
      }

      function TileLinkPanel({ village, hoveredZoneId, setHoveredZoneId, selectedZoneId, setSelectedZoneId }) {
        const toneForState = (state) => {
          if (state === "worked" || state === "selected") return "good";
          if (state === "blocked") return "bad";
          return "warn";
        };

        return (
          <section className="inspector-section">
            <div className="panel-header">
              <div>
                <h3>Work Area & Tile Links</h3>
                <p>Hover the panel to light the map. Hover the map to light the matching row. The relationship is supposed to be obvious now.</p>
              </div>
            </div>
            <div className="tile-list">
              {village.tileZones.map((tile) => (
                <div
                  key={tile.id}
                  className={`tile-row ${hoveredZoneId === tile.id || selectedZoneId === tile.id ? "is-highlighted" : ""}`}
                  onMouseEnter={() => setHoveredZoneId(tile.id)}
                  onMouseLeave={() => setHoveredZoneId(null)}
                  onClick={() => setSelectedZoneId(tile.id)}
                >
                  <div className="tile-row-top">
                    <div>
                      <strong>{tile.label}</strong>
                      <small>{tile.detail}</small>
                    </div>
                    <div className="tile-state-band">
                      <span className={`tile-state-chip ${toneForState(tile.state)}`}>{tile.state}</span>
                    </div>
                  </div>
                  <div className="minor-copy" style={{ marginTop: "8px" }}>{tile.yieldLabel}</div>
                </div>
              ))}
            </div>
            <div className="legend-board">
              <div className="legend-pill">Worked</div>
              <div className="legend-pill">Owned</div>
              <div className="legend-pill">Workable Radius</div>
              <div className="legend-pill">Blocked</div>
              <div className="legend-pill">Selected</div>
            </div>
          </section>
        );
      }

      function ComparisonPanel({ village }) {
        return (
          <section className="inspector-section">
            <div className="panel-header">
              <div>
                <h3>Settlement Comparison</h3>
                <p>This game has one settlement, so comparison is current versus previous turn and peak rather than village-versus-village.</p>
              </div>
            </div>
            <div className="compare-list">
              {village.compare.map((row) => (
                <div className="compare-row" key={row.key}>
                  <strong>{row.label}</strong>
                  <span>Now {row.current}</span>
                  <span>Prev {row.previous}</span>
                  <span>Peak {row.peak}</span>
                </div>
              ))}
            </div>
          </section>
        );
      }

      function VillageInspector({
        state,
        village,
        assets,
        dispatch,
        inspectorMode,
        setInspectorMode,
        activeTab,
        setActiveTab,
        hoveredZoneId,
        setHoveredZoneId,
        selectedZoneId,
        setSelectedZoneId,
        overlayMode,
        setOverlayMode,
      }) {
        const renderTab = () => {
          if (activeTab === "overview") {
            return (
              <div className="overview-grid">
                <div className="inspector-section">
                  <ResourcePanel state={state} assets={assets} village={village} />
                  <div className="info-card">
                    <h3>What is happening right now?</h3>
                    <div className="minor-copy" style={{ marginTop: "8px" }}>{village.whatsHappening}</div>
                    <h3 style={{ marginTop: "12px" }}>Why?</h3>
                    <div className="minor-copy" style={{ marginTop: "8px" }}>{village.whyHappening}</div>
                    <h3 style={{ marginTop: "12px" }}>What next?</h3>
                    <div className="minor-copy" style={{ marginTop: "8px" }}>{village.primaryRecommendation}</div>
                  </div>
                  <TileLinkPanel
                    village={village}
                    hoveredZoneId={hoveredZoneId}
                    setHoveredZoneId={setHoveredZoneId}
                    selectedZoneId={selectedZoneId}
                    setSelectedZoneId={setSelectedZoneId}
                  />
                </div>
                <div className="inspector-section">
                  <ProductionPanel state={state} village={village} assets={assets} dispatch={dispatch} onFocusZone={setHoveredZoneId} />
                  <StatsPanel state={state} village={village} assets={assets} />
                </div>
              </div>
            );
          }
          if (activeTab === "population") {
            return (
              <div className="inspector-section">
                <StatsPanel state={state} village={village} assets={assets} />
                <div className="card-grid-2">
                  {Object.entries(village.assignments).map(([key, value]) => (
                    <div className="info-card" key={key}>
                      <h3>{key[0].toUpperCase() + key.slice(1)}</h3>
                      <div className="resource-value">{value}</div>
                      <div className="minor-copy">{key === "farmers" ? "Food work" : key === "makers" ? "Production work" : key === "scholars" ? "Knowledge work" : key === "caretakers" ? "Health and welfare" : "Security and watch"}</div>
                    </div>
                  ))}
                </div>
                <div className="info-card">
                  <h3>Idle Workers</h3>
                  <div className="resource-value">{village.idleWorkers}</div>
                  <div className="minor-copy">Idle labor is surfaced directly because it is otherwise easy to miss and usually means bad planning.</div>
                </div>
              </div>
            );
          }
          if (activeTab === "buildings") {
            return (
              <BuildingGroupsPanel
                village={village}
                assets={assets}
                hoveredZoneId={hoveredZoneId}
                setHoveredZoneId={setHoveredZoneId}
                selectedZoneId={selectedZoneId}
                setSelectedZoneId={setSelectedZoneId}
              />
            );
          }
          if (activeTab === "production") {
            return <ProductionPanel state={state} village={village} assets={assets} dispatch={dispatch} onFocusZone={setHoveredZoneId} />;
          }
          if (activeTab === "defense") {
            return (
              <div className="inspector-section">
                <StatsPanel state={state} village={village} assets={assets} />
                <BuildingGroupsPanel
                  village={village}
                  assets={assets}
                  hoveredZoneId={hoveredZoneId}
                  setHoveredZoneId={setHoveredZoneId}
                  selectedZoneId={selectedZoneId}
                  setSelectedZoneId={setSelectedZoneId}
                  visibleGroups={[{ key: "defense", label: "Defense", zoneId: "civic" }]}
                />
              </div>
            );
          }
          return (
            <div className="inspector-section">
              <ResourcePanel state={state} assets={assets} village={village} />
              <ComparisonPanel village={village} />
              <PolicyPanel state={state} dispatch={dispatch} />
            </div>
          );
        };

        return (
          <section className="panel village-panel" aria-label="Village Inspector">
            <VillageSummaryStrip state={state} village={village} />
            <VillageAlertStrip alerts={village.alerts} />
            <div className="village-titlebar">
              <div className="mode-toggle" role="tablist" aria-label="Village inspector density">
                <button className={inspectorMode === "compact" ? "is-active" : ""} onClick={() => setInspectorMode("compact")}>
                  Compact HUD
                </button>
                <button className={inspectorMode === "expanded" ? "is-active" : ""} onClick={() => setInspectorMode("expanded")}>
                  Expanded Inspector
                </button>
              </div>
              <div className="overlay-toggle" aria-label="Settlement overlay toggle">
                {["none", "work", "influence"].map((mode) => (
                  <button key={mode} className={overlayMode === mode ? "is-active" : ""} onClick={() => setOverlayMode(mode)}>
                    {mode === "none" ? "Overlay Off" : mode === "work" ? "Worked Tiles" : "Influence Area"}
                  </button>
                ))}
              </div>
            </div>
            {inspectorMode === "expanded" ? (
              <>
                <div className="tab-strip" role="tablist" aria-label="Village sections">
                  {VILLAGE_TABS.map((tab) => (
                    <button key={tab.key} className={activeTab === tab.key ? "is-active" : ""} onClick={() => setActiveTab(tab.key)}>
                      {tab.label}
                    </button>
                  ))}
                </div>
                {renderTab()}
              </>
            ) : (
              <div className="inspector-section">
                <div className="info-card">
                  <h3>Quick Decision View</h3>
                  <div className="minor-copy" style={{ marginTop: "8px" }}>{village.whatsHappening}</div>
                  <div className="minor-copy" style={{ marginTop: "8px" }}>{village.whyHappening}</div>
                  <div className="minor-copy" style={{ marginTop: "8px" }}>{village.primaryRecommendation}</div>
                </div>
                <ProductionPanel state={state} village={village} assets={assets} dispatch={dispatch} onFocusZone={setHoveredZoneId} />
              </div>
            )}
            <div className="sticky-bar">
              <div className="sticky-actions">
                <button className="primary" onClick={() => setActiveTab("production")}>Manage Production</button>
                <button onClick={() => setActiveTab("population")}>Assign Workers</button>
                <button disabled={state.projectQueue.length >= 4} onClick={() => dispatch({ type: "QUEUE_PROJECT", key: "guardpost" })}>
                  Construct Guard Post
                </button>
                <button onClick={() => setActiveTab("defense")}>Inspect Defenses</button>
                <button
                  onClick={() => {
                    const nextName = window.prompt("Rename settlement", state.settlementName);
                    if (nextName) dispatch({ type: "RENAME_SETTLEMENT", name: nextName });
                  }}
                >
                  Rename
                </button>
                <button
                  onClick={() => {
                    const canvas = document.querySelector("canvas");
                    if (canvas) canvas.scrollIntoView({ behavior: "smooth", block: "center" });
                  }}
                >
                  Center Camera
                </button>
              </div>
            </div>
          </section>
        );
      }

      function ProgressVisualization({ state }) {
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Historical Trends</h2>
                <p>Recent turns only. Long empires deserve archivists; you have sparklines.</p>
              </div>
            </div>
            <div className="history-grid">
              {HISTORY_META.map((item) => {
                const values = state.history[item.key] || [];
                return (
                  <div className="spark-card" key={item.key}>
                    <div className="policy-topline">
                      <strong>{item.label}</strong>
                      <span>{values[values.length - 1] ?? 0}</span>
                    </div>
                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-label={item.label}>
                      <path d="M0 86H100" stroke="rgba(17,37,56,0.1)" strokeWidth="1.8" />
                      <path d={`M${sparkPoints(values)}`} fill="none" stroke={item.color} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                  </div>
                );
              })}
            </div>
          </section>
        );
      }

      function EventLog({ entries, assets }) {
        return (
          <section className="panel">
            <div className="panel-header">
              <div>
                <h2>Event Log</h2>
                <p>Recent shocks, milestones, and the occasional good news. Very occasional.</p>
              </div>
            </div>
            <div className="event-list">
              {entries.map((entry) => (
                <article className="event-item" key={entry.id}>
                  <img className="icon-badge" src={assets[entry.icon]?.uri} alt={entry.title} />
                  <div>
                    <h4>{entry.title}</h4>
                    <div className="event-meta">
                      Year {entry.year} · Turn {entry.turn}
                    </div>
                    <div className="event-body">{entry.detail}</div>
                    <span className="event-tag">{entry.tag}</span>
                  </div>
                </article>
              ))}
            </div>
          </section>
        );
      }

      function drawSprite(ctx, asset, x, y, width, height, alpha = 1) {
        if (!asset?.image) return;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.drawImage(asset.image, x, y, width, height);
        ctx.restore();
      }

      function findZoneAtPoint(zones, x, y) {
        return zones.find((zone) => (
          x >= zone.rect.x &&
          x <= zone.rect.x + zone.rect.w &&
          y >= zone.rect.y &&
          y <= zone.rect.y + zone.rect.h
        )) || null;
      }

      function CanvasWorld({ state, assets, village, hoveredZoneId, setHoveredZoneId, selectedZoneId, setSelectedZoneId, overlayMode, setOverlayMode }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas || !assets.citizen) return;
          const ctx = canvas.getContext("2d");
          const width = canvas.width;
          const height = canvas.height;
          const stage = STAGES.find((entry) => entry.label === state.developmentStage) || STAGES[0];
          const crisis = state.unrest > 55 || state.stability < 45 || state.health < 35;
          const prosperity = state.happiness > 72 && state.health > 68 && state.environment > 50;

          ctx.clearRect(0, 0, width, height);

          const sky = ctx.createLinearGradient(0, 0, 0, height * 0.55);
          sky.addColorStop(0, state.environment > 45 ? "#d2ecf5" : "#d4c7bf");
          sky.addColorStop(1, state.environment > 45 ? "#87b6c8" : "#a99a90");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, width, height);

          const sunX = width - 120;
          const sunY = 90;
          const sun = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 80);
          sun.addColorStop(0, prosperity ? "rgba(255,242,172,0.92)" : "rgba(250,224,157,0.8)");
          sun.addColorStop(1, "rgba(255,227,120,0)");
          ctx.fillStyle = sun;
          ctx.beginPath();
          ctx.arc(sunX, sunY, 80, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = state.environment > 38 ? "#7f9d67" : "#857156";
          ctx.fillRect(0, height * 0.46, width, height * 0.54);
          ctx.fillStyle = state.environment > 38 ? "#5c7d59" : "#675b48";
          ctx.beginPath();
          ctx.moveTo(0, height * 0.62);
          ctx.quadraticCurveTo(width * 0.22, height * 0.55, width * 0.38, height * 0.6);
          ctx.quadraticCurveTo(width * 0.56, height * 0.68, width * 0.78, height * 0.58);
          ctx.quadraticCurveTo(width * 0.9, height * 0.52, width, height * 0.62);
          ctx.lineTo(width, height);
          ctx.lineTo(0, height);
          ctx.closePath();
          ctx.fill();

          drawSprite(ctx, assets.riverStrip, 0, height - 186, width * 0.42, 165, 0.94);

          const fieldAsset =
            state.environment > 65 ? assets.fertileField : state.environment > 35 ? assets.normalField : assets.witheredField;
          const forestAsset = state.environment > 50 ? assets.healthyForest : assets.damagedForest;
          const homeAsset = state.population > 135 ? assets.apartmentBlock : state.population > 58 ? assets.house : assets.hut;
          const hubAsset = assets[stage.hub];

          const homeCount = Math.max(2, Math.round(state.population / 18));
          const farmCount = Math.max(2, state.policies.agriculture + Math.round(state.food / 95));
          const industryCount = Math.max(1, state.policies.industry + Math.round(state.industry / 100));
          const knowledgeCount = Math.max(1, state.policies.education + state.policies.research + Math.round(state.knowledge / 110));
          const civicCount = Math.max(1, state.policies.health + state.policies.welfare);

          const farmStartX = 40;
          for (let i = 0; i < farmCount; i++) {
            drawSprite(ctx, fieldAsset, farmStartX + i * 98, height - 190 + (i % 2) * 12, 110, 84);
          }
          drawSprite(ctx, assets.farmPlot, farmStartX + 36, height - 224, 132, 92);

          for (let i = 0; i < 3; i++) {
            drawSprite(ctx, forestAsset, 28 + i * 82, 210 + (i % 2) * 18, 96, 78, state.environment > 30 ? 1 : 0.82);
          }

          if (state.environment < 45 || state.policies.industry >= 2) {
            drawSprite(ctx, assets.pollutedGround, width * 0.56, height - 144, 220, 92, 0.82);
          }

          const structureY = height - 242;
          for (let i = 0; i < homeCount; i++) {
            drawSprite(ctx, homeAsset, 240 + i * 66, structureY + ((i % 3) * 10), 86, 72);
          }

          drawSprite(ctx, hubAsset, width * 0.44, height - 295, 260, 190);

          const industryAssets = [assets.workshop, assets.factory, assets.granary, assets.waterTower];
          for (let i = 0; i < industryCount; i++) {
            const asset = industryAssets[i % industryAssets.length];
            drawSprite(ctx, asset, width * 0.65 + i * 58, height - 228 + (i % 2) * 8, 92, 84);
          }

          const knowledgeAssets = [assets.school, assets.library, assets.lab, assets.observatory];
          for (let i = 0; i < knowledgeCount; i++) {
            const asset = knowledgeAssets[i % knowledgeAssets.length];
            drawSprite(ctx, asset, width * 0.44 + i * 52, height - 160 - (i % 2) * 12, 88, 76);
          }

          const civicAssets = [assets.clinic, assets.hospital, assets.park, assets.watchtower, assets.solarField];
          for (let i = 0; i < civicCount; i++) {
            const asset = civicAssets[i % civicAssets.length];
            drawSprite(ctx, asset, 160 + i * 90, height - 118 - (i % 2) * 8, 96, 80);
          }

          if (state.technologyLevel >= 8) {
            drawSprite(ctx, assets.solarField, width - 280, height - 145, 170, 92);
          }

          const citizenCount = Math.min(12, Math.max(3, Math.round(state.population / 20)));
          for (let i = 0; i < citizenCount; i++) {
            const x = 250 + ((i * 61) % 430);
            const y = height - 72 - ((i % 3) * 12);
            drawSprite(ctx, assets.citizen, x, y, 28, 28, 0.92);
          }

          if (state.policies.industry >= 2 || state.environment < 42) {
            const smokeCount = Math.max(1, Math.round(state.policies.industry + (50 - state.environment) / 24));
            for (let i = 0; i < smokeCount; i++) {
              drawSprite(ctx, assets.smokePlume, width * 0.7 + i * 26, 90 + i * 4, 82, 82, 0.7);
            }
          }

          if (crisis) {
            drawSprite(ctx, assets.stormCloud, 40, 30, 180, 120, 0.88);
            drawSprite(ctx, assets.eventUnrest, width - 140, 24, 92, 92, 0.92);
            ctx.fillStyle = "rgba(166,61,51,0.12)";
            ctx.fillRect(0, 0, width, height);
          }

          if (prosperity) {
            drawSprite(ctx, assets.eventHarvest, width - 152, 28, 96, 96, 0.95);
            ctx.strokeStyle = "rgba(255,247,194,0.52)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, height - 40);
            for (let x = 0; x <= width; x += 40) {
              ctx.lineTo(x, height - 34 - Math.sin(x / 60) * 4);
            }
            ctx.stroke();
          }
          if (overlayMode !== "none") {
            village.tileZones.forEach((zone) => {
              const isHighlighted = hoveredZoneId === zone.id || selectedZoneId === zone.id || zone.state === "selected";
              const fill =
                zone.state === "blocked"
                  ? "rgba(166,61,51,0.14)"
                  : zone.state === "worked"
                  ? "rgba(79,142,93,0.14)"
                  : zone.state === "selected"
                  ? "rgba(213,159,77,0.16)"
                  : "rgba(47,127,157,0.12)";
              ctx.save();
              ctx.fillStyle = fill;
              ctx.strokeStyle = isHighlighted ? "rgba(17,37,56,0.85)" : "rgba(17,37,56,0.34)";
              ctx.lineWidth = isHighlighted ? 3 : 1.5;
              ctx.setLineDash(overlayMode === "influence" && zone.state === "workable" ? [8, 6] : []);
              ctx.beginPath();
              ctx.roundRect(zone.rect.x, zone.rect.y, zone.rect.w, zone.rect.h, 12);
              ctx.fill();
              ctx.stroke();
              ctx.fillStyle = "rgba(17,37,56,0.88)";
              ctx.font = `${isHighlighted ? "700" : "600"} 14px "Space Grotesk", sans-serif`;
              ctx.fillText(zone.label, zone.rect.x + 10, zone.rect.y + 20);
              ctx.restore();
            });
          }
        }, [state, assets, village, hoveredZoneId, selectedZoneId, overlayMode]);

        function readCanvasPoint(event) {
          const canvas = canvasRef.current;
          if (!canvas) return null;
          const bounds = canvas.getBoundingClientRect();
          const scaleX = canvas.width / bounds.width;
          const scaleY = canvas.height / bounds.height;
          return {
            x: (event.clientX - bounds.left) * scaleX,
            y: (event.clientY - bounds.top) * scaleY,
          };
        }

        return (
          <section className="panel world-panel">
            <div className="panel-header">
              <div>
                <h2>Settlement Map</h2>
                <p>The map now links directly to the inspector. Hover or select districts to trace cause and effect between land and panel rows.</p>
              </div>
              <div className="overlay-toggle">
                {["none", "work", "influence"].map((mode) => (
                  <button key={mode} className={overlayMode === mode ? "is-active" : ""} onClick={() => setOverlayMode(mode)}>
                    {mode === "none" ? "Overlay Off" : mode === "work" ? "Worked / Owned" : "Influence Radius"}
                  </button>
                ))}
              </div>
            </div>
            <div className="world-wrap">
              <canvas
                ref={canvasRef}
                width="960"
                height="540"
                onMouseMove={(event) => {
                  const point = readCanvasPoint(event);
                  if (!point) return;
                  const zone = findZoneAtPoint(village.tileZones, point.x, point.y);
                  setHoveredZoneId(zone?.id || null);
                }}
                onMouseLeave={() => setHoveredZoneId(null)}
                onClick={(event) => {
                  const point = readCanvasPoint(event);
                  if (!point) return;
                  const zone = findZoneAtPoint(village.tileZones, point.x, point.y);
                  setSelectedZoneId(zone?.id || null);
                }}
              />
              <div className="world-overlay">
                <div className="world-chip">Hub: {state.settlementName} · {state.developmentStage}</div>
                <div className="world-chip">
                  Focus: {selectedZoneId ? village.tileZones.find((zone) => zone.id === selectedZoneId)?.label || "None" : "None"}
                </div>
              </div>
            </div>
            <div className="canvas-hint">
              <div className="legend-pill">Hover district rows to pulse map zones</div>
              <div className="legend-pill">Click map zones to pin selection</div>
              <div className="legend-pill">Worked / owned / workable / blocked states use text, borders, and fill patterns</div>
            </div>
            <div className="legend-row">
              <div className="legend-pill">
                <span className="legend-swatch" style={{ background: "#4f8e5d" }} />
                Prosperity = cleaner land, brighter light, stronger morale
              </div>
              <div className="legend-pill">
                <span className="legend-swatch" style={{ background: "#a63d33" }} />
                Crisis = smoke, storm tint, unrest markers, and harsher terrain
              </div>
            </div>
          </section>
        );
      }

      function App() {
        const [state, dispatch] = useReducer(reducer, undefined, () => createInitialState());
        const [assets, setAssets] = useState({});
        const [inspectorMode, setInspectorMode] = useState("expanded");
        const [activeVillageTab, setActiveVillageTab] = useState("overview");
        const [overlayMode, setOverlayMode] = useState("work");
        const [hoveredZoneId, setHoveredZoneId] = useState(null);
        const [selectedZoneId, setSelectedZoneId] = useState("hub");
        const latestStateRef = useRef(state);
        const virtualAccumulatorRef = useRef(0);
        const shellRef = useRef(null);

        useEffect(() => {
          latestStateRef.current = state;
        }, [state]);

        useEffect(() => {
          if (state.turn === 0) {
            setActiveVillageTab("overview");
            setSelectedZoneId("hub");
            setHoveredZoneId(null);
          }
        }, [state.turn, state.settlementName]);

        useEffect(() => {
          let cancelled = false;
          loadAssetPack().then((pack) => {
            if (cancelled) return;
            setAssets(pack);
            dispatch({ type: "ASSETS_READY" });
          });
          return () => {
            cancelled = true;
          };
        }, []);

        useEffect(() => {
          if (state.status !== "running") return undefined;
          const timer = window.setInterval(() => {
            dispatch({ type: "STEP_TURN" });
          }, TURN_INTERVAL_MS);
          return () => window.clearInterval(timer);
        }, [state.status]);

        useEffect(() => {
          // Deterministic browser hooks used by automated game checks.
          window.render_game_to_text = () => JSON.stringify(getWorldSnapshot(latestStateRef.current), null, 2);
          window.advanceTime = (ms) => {
            virtualAccumulatorRef.current += ms;
            while (
              virtualAccumulatorRef.current >= TURN_INTERVAL_MS &&
              latestStateRef.current.status === "running"
            ) {
              virtualAccumulatorRef.current -= TURN_INTERVAL_MS;
              dispatch({ type: "STEP_TURN" });
            }
            return Promise.resolve();
          };
          return () => {
            delete window.render_game_to_text;
            delete window.advanceTime;
          };
        }, []);

        useEffect(() => {
          function onKeyDown(event) {
            if (event.key.toLowerCase() !== "f") return;
            const host = shellRef.current;
            if (!host) return;
            if (document.fullscreenElement) {
              document.exitFullscreen();
            } else if (host.requestFullscreen) {
              host.requestFullscreen();
            }
          }

          window.addEventListener("keydown", onKeyDown);
          return () => window.removeEventListener("keydown", onKeyDown);
        }, []);

        const ready = state.assetsReady && Object.keys(assets).length > 0;
        const snapshot = getWorldSnapshot(state);
        const village = getVillageModel(state);

        if (!ready) {
          return (
            <div className="app-shell">
              <section className="header-card">
                <h1>Civilization Simulator Lite</h1>
                <p className="subtitle">Loading the asset registry and preparing the machinery of history.</p>
              </section>
            </div>
          );
        }

        return (
          <div className="app-shell" ref={shellRef}>
            <GameHeader state={state} />
            <div className="main-grid">
              <div className="left-column">
                <CanvasWorld
                  state={state}
                  assets={assets}
                  village={village}
                  hoveredZoneId={hoveredZoneId}
                  setHoveredZoneId={setHoveredZoneId}
                  selectedZoneId={selectedZoneId}
                  setSelectedZoneId={setSelectedZoneId}
                  overlayMode={overlayMode}
                  setOverlayMode={setOverlayMode}
                />
                <ControlPanel state={state} dispatch={dispatch} />
                <ProgressVisualization state={state} />
              </div>
              <div className="right-column">
                <VillageInspector
                  state={state}
                  village={village}
                  assets={assets}
                  dispatch={dispatch}
                  inspectorMode={inspectorMode}
                  setInspectorMode={setInspectorMode}
                  activeTab={activeVillageTab}
                  setActiveTab={setActiveVillageTab}
                  hoveredZoneId={hoveredZoneId}
                  setHoveredZoneId={setHoveredZoneId}
                  selectedZoneId={selectedZoneId}
                  setSelectedZoneId={setSelectedZoneId}
                  overlayMode={overlayMode}
                  setOverlayMode={setOverlayMode}
                />
                <EventLog entries={state.eventLog} assets={assets} />
                <section className="panel">
                  <div className="panel-header">
                    <div>
                      <h2>Simulation Notes</h2>
                      <p>Deterministic turn logic with weighted events, bounded variables, and replayable seeded randomness.</p>
                    </div>
                  </div>
                  <div className="minor-copy">
                    <strong>Snapshot</strong>
                    <pre style={{ margin: "10px 0 0", whiteSpace: "pre-wrap", fontSize: "0.8rem", lineHeight: 1.45 }}>
{JSON.stringify(snapshot, null, 2)}
                    </pre>
                  </div>
                </section>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
