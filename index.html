<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civilization Simulator Lite</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%23112538' d='M10 56V24l7-6 7 6v32zM26 56V18l8-7 8 7v38zM44 56V24l7-6 7 6v32z'/%3E%3Cpath fill='%23d59f4d' d='M9 22l8-7 8 7M25 17l9-8 9 8M43 22l8-7 8 7'/%3E%3Cpath fill='%23f0eadb' d='M14 34h6v8h-6zm16-6h7v8h-7zm17 7h6v8h-6z'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #112538;
        --paper: #f0eadb;
        --sand: #dcc9a3;
        --gold: #d59f4d;
        --brass: #c57d2c;
        --sea: #2f7f9d;
        --forest: #42734f;
        --wine: #7f3f35;
        --brick: #b85e43;
        --slate: #466071;
        --crisis: #a63d33;
        --prosper: #4f8e5d;
        --panel: rgba(245, 238, 223, 0.88);
        --panel-edge: rgba(17, 37, 56, 0.18);
        --shadow: 0 16px 40px rgba(17, 37, 56, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--ink);
        font-family: "Space Grotesk", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 245, 214, 0.95), rgba(240, 234, 219, 0.84) 22%, rgba(212, 206, 183, 0.55) 60%, transparent 70%),
          linear-gradient(160deg, #dbe3df 0%, #c2d0cb 35%, #91b0b2 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(17, 37, 56, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(17, 37, 56, 0.06) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      }

      #root {
        min-height: 100vh;
      }

      .app-shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }

      .header-card,
      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-edge);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .header-card {
        position: relative;
        overflow: hidden;
        padding: 22px 24px 18px;
        border-radius: 28px;
        background:
          linear-gradient(120deg, rgba(255, 249, 233, 0.96), rgba(238, 226, 192, 0.88) 40%, rgba(225, 216, 203, 0.78) 100%);
      }

      .header-card::after {
        content: "";
        position: absolute;
        inset: auto -80px -110px auto;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(213, 159, 77, 0.28), rgba(213, 159, 77, 0));
      }

      .title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      h1,
      h2,
      h3,
      h4 {
        margin: 0;
        font-family: "Bree Serif", Georgia, serif;
        letter-spacing: 0.02em;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 1;
      }

      .subtitle {
        margin-top: 10px;
        max-width: 860px;
        font-size: 0.98rem;
        line-height: 1.5;
        color: rgba(17, 37, 56, 0.82);
      }

      .status-banner {
        min-width: 240px;
        padding: 12px 14px;
        border-radius: 18px;
        border: 1px solid rgba(17, 37, 56, 0.12);
        background: rgba(255, 252, 245, 0.72);
      }

      .status-banner strong {
        display: block;
        margin-bottom: 6px;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .status-banner.prosper {
        color: var(--prosper);
        border-color: rgba(79, 142, 93, 0.35);
        background: rgba(230, 247, 232, 0.8);
      }

      .status-banner.crisis {
        color: var(--crisis);
        border-color: rgba(166, 61, 51, 0.35);
        background: rgba(253, 233, 226, 0.88);
      }

      .meta-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .meta-pill {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(17, 37, 56, 0.07);
        font-size: 0.92rem;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .meta-pill strong {
        color: var(--sea);
      }

      .main-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.7fr) minmax(340px, 0.95fr);
        gap: 18px;
        margin-top: 18px;
      }

      .left-column,
      .right-column {
        display: grid;
        gap: 18px;
      }

      .panel {
        border-radius: 24px;
        padding: 18px;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .panel-header p,
      .minor-copy {
        margin: 0;
        color: rgba(17, 37, 56, 0.72);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .world-panel {
        padding: 18px;
        background:
          linear-gradient(180deg, rgba(255, 253, 245, 0.92), rgba(226, 233, 226, 0.76));
      }

      .world-wrap {
        position: relative;
      }

      canvas {
        width: 100%;
        display: block;
        border-radius: 22px;
        border: 1px solid rgba(17, 37, 56, 0.12);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
        background: linear-gradient(180deg, #d1e1e5, #96b0a3 45%, #7d9a71 46%, #5f7b5e 100%);
      }

      .world-overlay {
        position: absolute;
        left: 16px;
        right: 16px;
        top: 16px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
      }

      .world-chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(11, 30, 45, 0.68);
        color: #f7f1df;
        font-size: 0.84rem;
        letter-spacing: 0.03em;
      }

      .control-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 12px 15px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--sea), #3f93a4);
        color: #f6fbfc;
        box-shadow: 0 12px 22px rgba(47, 127, 157, 0.22);
      }

      .btn-secondary {
        background: rgba(17, 37, 56, 0.08);
        color: var(--ink);
      }

      .btn-danger {
        background: linear-gradient(135deg, var(--wine), var(--brick));
        color: #fff7f0;
      }

      .btn-accent {
        background: linear-gradient(135deg, #e0b064, var(--gold));
        color: #342411;
      }

      .resource-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .resource-card {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-radius: 20px;
        background: rgba(255, 252, 245, 0.8);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .resource-card img,
      .icon-badge {
        width: 52px;
        height: 52px;
        object-fit: contain;
        flex: 0 0 auto;
      }

      .resource-card h4 {
        font-size: 0.98rem;
      }

      .resource-value {
        font-size: 1.45rem;
        font-weight: 700;
        margin-top: 2px;
      }

      .delta {
        font-size: 0.86rem;
        margin-top: 4px;
      }

      .delta.good {
        color: var(--prosper);
      }

      .delta.bad {
        color: var(--crisis);
      }

      .meter-grid {
        display: grid;
        gap: 12px;
      }

      .meter-row {
        display: grid;
        grid-template-columns: minmax(112px, 132px) 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .meter-name {
        display: flex;
        gap: 10px;
        align-items: center;
        font-weight: 700;
      }

      .meter-bar {
        position: relative;
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(17, 37, 56, 0.08);
      }

      .meter-fill {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: inherit;
      }

      .policy-list {
        display: grid;
        gap: 12px;
      }

      .policy-row {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.84);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .policy-topline,
      .policy-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .policy-label {
        font-size: 1rem;
        font-weight: 700;
      }

      .policy-controls {
        margin-top: 10px;
      }

      .policy-controls button {
        min-width: 38px;
        height: 38px;
        padding: 0;
        border-radius: 12px;
      }

      .policy-level {
        min-width: 48px;
        text-align: center;
        font-weight: 700;
        font-size: 1.05rem;
      }

      .points-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(17, 37, 56, 0.08);
        font-weight: 700;
      }

      .history-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .spark-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.8);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .spark-card svg {
        width: 100%;
        height: 84px;
        display: block;
      }

      .event-list {
        display: grid;
        gap: 12px;
        max-height: 540px;
        overflow: auto;
        padding-right: 4px;
      }

      .event-item {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.8);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .event-item h4 {
        font-size: 0.98rem;
      }

      .event-meta {
        font-size: 0.82rem;
        color: rgba(17, 37, 56, 0.64);
        margin-top: 2px;
      }

      .event-body {
        margin-top: 5px;
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .event-tag {
        display: inline-flex;
        margin-top: 6px;
        padding: 6px 8px;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: rgba(17, 37, 56, 0.08);
      }

      .legend-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      .legend-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 252, 245, 0.8);
        border: 1px solid rgba(17, 37, 56, 0.08);
        font-size: 0.84rem;
      }

      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .footer-note {
        margin-top: 18px;
        font-size: 0.84rem;
        color: rgba(17, 37, 56, 0.72);
      }

      .village-panel {
        display: grid;
        gap: 16px;
        padding-bottom: 92px;
      }

      .village-topbar {
        display: grid;
        gap: 14px;
        padding: 18px;
        border-radius: 22px;
        background: linear-gradient(145deg, rgba(255, 252, 245, 0.95), rgba(233, 225, 205, 0.8));
        border: 1px solid rgba(17, 37, 56, 0.1);
      }

      .village-titlebar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: rgba(17, 37, 56, 0.56);
      }

      .village-title {
        font-size: 1.72rem;
        line-height: 1.05;
      }

      .village-subtitle {
        margin-top: 5px;
        font-size: 0.93rem;
        color: rgba(17, 37, 56, 0.7);
      }

      .mode-toggle,
      .tab-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .mode-toggle button,
      .tab-strip button {
        border: 1px solid rgba(17, 37, 56, 0.12);
        background: rgba(17, 37, 56, 0.05);
        color: var(--ink);
      }

      .mode-toggle button.is-active,
      .tab-strip button.is-active {
        background: linear-gradient(135deg, rgba(47, 127, 157, 0.16), rgba(213, 159, 77, 0.24));
        border-color: rgba(47, 127, 157, 0.35);
        box-shadow: 0 8px 20px rgba(47, 127, 157, 0.12);
      }

      .village-summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .summary-card {
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.66);
        border: 1px solid rgba(17, 37, 56, 0.09);
      }

      .summary-label {
        font-size: 0.77rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: rgba(17, 37, 56, 0.55);
      }

      .summary-value {
        margin-top: 5px;
        font-size: 1.5rem;
        font-weight: 700;
      }

      .summary-subvalue {
        margin-top: 6px;
        font-size: 0.86rem;
        color: rgba(17, 37, 56, 0.72);
      }

      .delta-pill,
      .status-chip,
      .tile-state-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        border: 1px solid rgba(17, 37, 56, 0.12);
        background: rgba(255, 252, 245, 0.82);
      }

      .delta-pill.good,
      .status-chip.good {
        color: var(--prosper);
        border-color: rgba(79, 142, 93, 0.3);
        background: rgba(231, 247, 233, 0.88);
      }

      .delta-pill.bad,
      .status-chip.bad {
        color: var(--crisis);
        border-color: rgba(166, 61, 51, 0.3);
        background: rgba(253, 234, 229, 0.92);
      }

      .delta-pill.warn,
      .status-chip.warn {
        color: var(--brass);
        border-color: rgba(197, 125, 44, 0.3);
        background: rgba(255, 244, 222, 0.9);
      }

      .alert-strip {
        display: grid;
        gap: 10px;
      }

      .alert-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        border-radius: 18px;
        border: 1px solid rgba(17, 37, 56, 0.09);
        background: rgba(255, 255, 255, 0.7);
      }

      .alert-item.critical {
        border-color: rgba(166, 61, 51, 0.28);
        background: rgba(253, 237, 232, 0.92);
      }

      .alert-item.warning {
        border-color: rgba(197, 125, 44, 0.28);
        background: rgba(255, 245, 227, 0.92);
      }

      .alert-icon {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: rgba(17, 37, 56, 0.08);
        font-weight: 700;
      }

      .inspector-section {
        display: grid;
        gap: 14px;
      }

      .overview-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.95fr);
        gap: 14px;
      }

      .card-grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .info-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.84);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .info-card h3,
      .subsection-title {
        font-size: 1.02rem;
      }

      .key-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 10px;
        font-size: 0.92rem;
      }

      .resource-split-grid {
        display: grid;
        gap: 12px;
      }

      .resource-split-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.84);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .split-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .split-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .split-metric {
        padding: 10px;
        border-radius: 14px;
        background: rgba(17, 37, 56, 0.04);
      }

      .metric-caption {
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(17, 37, 56, 0.5);
      }

      .metric-value {
        margin-top: 5px;
        font-size: 1.02rem;
        font-weight: 700;
      }

      .queue-list,
      .building-group-list,
      .tile-list,
      .compare-list {
        display: grid;
        gap: 10px;
      }

      .queue-item,
      .building-row,
      .tile-row,
      .compare-row {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 252, 245, 0.84);
        border: 1px solid rgba(17, 37, 56, 0.08);
      }

      .queue-item.is-current,
      .building-row.is-highlighted,
      .tile-row.is-highlighted {
        border-color: rgba(47, 127, 157, 0.4);
        box-shadow: inset 0 0 0 1px rgba(47, 127, 157, 0.2);
        background: rgba(233, 246, 249, 0.95);
      }

      .queue-item-top,
      .building-row-top,
      .tile-row-top,
      .compare-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .queue-progress {
        position: relative;
        margin-top: 10px;
        height: 12px;
        border-radius: 999px;
        background: rgba(17, 37, 56, 0.08);
        overflow: hidden;
      }

      .queue-progress > span {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--sea), var(--gold));
      }

      .queue-actions,
      .sticky-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .empty-state {
        padding: 16px;
        border-radius: 18px;
        border: 1px dashed rgba(17, 37, 56, 0.18);
        background: rgba(255, 252, 245, 0.68);
        color: rgba(17, 37, 56, 0.68);
      }

      .building-group {
        display: grid;
        gap: 10px;
      }

      .building-group-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .tile-row {
        cursor: pointer;
      }

      .tile-row small,
      .building-row small,
      .queue-item small {
        display: block;
        margin-top: 4px;
        color: rgba(17, 37, 56, 0.66);
        line-height: 1.45;
      }

      .tile-state-band {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .legend-board {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .legend-board .legend-pill {
        background: rgba(255, 252, 245, 0.92);
      }

      .sticky-bar {
        position: sticky;
        bottom: 10px;
        z-index: 2;
        padding: 12px;
        border-radius: 18px;
        background: rgba(17, 37, 56, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 18px 30px rgba(17, 37, 56, 0.24);
      }

      .sticky-bar .sticky-actions button {
        background: rgba(255, 255, 255, 0.12);
        color: #f7f1df;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sticky-bar .sticky-actions button.primary {
        background: linear-gradient(135deg, rgba(213, 159, 77, 0.92), rgba(47, 127, 157, 0.88));
        color: #fff9ee;
      }

      .compare-row strong,
      .queue-item-top strong,
      .building-row-top strong,
      .tile-row-top strong {
        font-size: 0.95rem;
      }

      .focus-summary {
        display: grid;
        gap: 8px;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tiny-icon {
        width: 18px;
        height: 18px;
        display: inline-block;
      }

      .canvas-hint {

        return { ...icons, ...events, ...structures };
      }

      const EVENT_DEFS = {
        drought: {
          label: "Drought",
          icon: "eventDrought",
          describe: (state) => "Rain failed. Fields wither and food output drops for two turns.",
          weight: (state) => 0.35 + Math.max(0, 55 - state.environment) / 30 + state.policies.industry * 0.05,
          apply: (state) => ({
            immediate: { food: -18 - state.policies.agriculture * 2, happiness: -4, environment: -3 },
            effect: { name: "Drought", turnsLeft: 2, icon: "eventDrought", modifiers: { foodMultiplier: 0.82 } },
          }),
        },
        harvestBoom: {
          label: "Harvest Boom",
          icon: "eventHarvest",
          describe: () => "A generous season swells the granaries.",
          weight: (state) => 0.22 + state.policies.agriculture * 0.12 + Math.max(0, state.environment - 45) / 40,
          apply: (state) => ({
            immediate: { food: 24 + state.policies.agriculture * 4, happiness: 3, health: 2 },
          }),
        },
        diseaseOutbreak: {
          label: "Disease Outbreak",
          icon: "eventPlague",
          describe: () => "Illness spreads through crowded districts. Recovery takes time.",
          weight: (state) => 0.16 + Math.max(0, 55 - state.health) / 30 + Math.max(0, state.population - 70) / 90,
          apply: () => ({
            immediate: { health: -11, happiness: -5, stability: -4 },
            effect: { name: "Recovery Strain", turnsLeft: 2, icon: "eventPlague", modifiers: { populationDelta: -2, foodMultiplier: 0.92 } },
          }),
        },
        scientificBreakthrough: {
          label: "Scientific Breakthrough",
          icon: "eventBreakthrough",
          describe: () => "A discovery sharpens research and production methods.",
          weight: (state) => 0.16 + state.policies.education * 0.08 + state.policies.research * 0.18 + state.knowledge / 220,
          apply: () => ({
            immediate: { knowledge: 24, happiness: 2 },
            effect: { name: "Research Surge", turnsLeft: 3, icon: "eventBreakthrough", modifiers: { knowledgeMultiplier: 1.22, industryMultiplier: 1.05 } },
          }),
        },
        migrationWave: {
          label: "Migration Wave",
          icon: "eventMigration",
          describe: () => "New families arrive, raising population and pressure on stores.",
          weight: (state) => 0.18 + Math.max(0, state.happiness - 45) / 45 + Math.max(0, state.stability - 50) / 60,
          apply: () => ({
            immediate: { population: 7, happiness: 2, food: -8 },
            effect: { name: "Settlement Boom", turnsLeft: 2, icon: "eventMigration", modifiers: { foodDemandMultiplier: 1.08 } },
          }),
        },
        civilUnrest: {
          label: "Civil Unrest",
          icon: "eventUnrest",
          describe: () => "Crowds turn hostile. Workshops slow and authority wobbles.",
          weight: (state) => 0.12 + state.unrest / 34 + Math.max(0, 45 - state.happiness) / 30,
          apply: () => ({
            immediate: { stability: -11, happiness: -8, industry: -10, unrest: 8 },
            effect: { name: "Sabotage", turnsLeft: 2, icon: "eventUnrest", modifiers: { industryMultiplier: 0.84 } },
          }),
        },
        tradeOpportunity: {
          label: "Trade Opportunity",
          icon: "eventTrade",
          describe: () => "Foreign merchants arrive with supplies and contracts.",
          weight: (state) => 0.18 + Math.max(0, state.industry - 40) / 85 + Math.max(0, state.stability - 50) / 75,
          apply: () => ({
            immediate: { industry: 20, food: 12, happiness: 3 },
          }),
        },
        industrialAccident: {
          label: "Industrial Accident",
          icon: "eventAccident",
          describe: () => "A mechanical failure scars the land and rattles the public.",
          weight: (state) => 0.11 + state.policies.industry * 0.12 + Math.max(0, 45 - state.environment) / 35,
          apply: () => ({
            immediate: { industry: -16, health: -5, environment: -8, happiness: -4 },
            effect: { name: "Cleanup Effort", turnsLeft: 2, icon: "eventAccident", modifiers: { industryMultiplier: 0.9 } },
          }),
        },
      };

      function stageIndexFromLabel(label) {
        return STAGES.findIndex((stage) => stage.label === label);
      }

      function computeStage(resources) {
        let current = STAGES[0];
        for (const stage of STAGES) {
          if (
            resources.population >= stage.pop &&
            resources.industry >= stage.industry &&
            resources.technologyLevel >= stage.tech
          ) {
            current = stage;
          }
        }
        return current;
      }

      function historyPush(history, value) {
        return [...history, round1(value)].slice(-MAX_HISTORY);
      }

      function createInitialState(seed = (Date.now() >>> 0) || 7) {
        const policies = {
          agriculture: 2,
          industry: 2,
          education: 1,
          health: 1,
          environment: 1,
          security: 1,
          welfare: 1,
          research: 1,
        };

        return {
          rngSeed: seed,
          status: "menu",
          assetsReady: false,
          settlementName: generateSettlementName(seed),
          turn: 0,
          year: 1000,
          food: 88,
          industry: 54,
          knowledge: 32,
          population: 24,
          happiness: 62,
          health: 64,
          environment: 60,
          stability: 64,
          unrest: 18,
          technologyLevel: 1,
          developmentStage: "Tribe",
          legacyScore: 0,
          policies,
          activeEffects: [],
          projectQueue: makeInitialProjectQueue(),
          completedProjects: {},
          nextQueueId: 4,
          eventLog: [
            {
              id: "boot-1",
              year: 1000,
              turn: 0,
              title: "Founding Settlement",
              detail: "A modest society stands ready. Feed it, steady it, and try not to ruin the future immediately.",
              icon: "iconLegacy",
              tag: "System",
            },
          ],
          history: {
            food: [88],
            population: [24],
            knowledge: [32],
            legacyScore: [0],
          },
          lastBreakdown: {
            foodDelta: 0,
            industryDelta: 0,
            knowledgeDelta: 0,
            populationDelta: 0,
          },
          victoryText: "",
          statusText: "Set your priorities and begin the first age.",
        };
      }

      function totalPolicyPoints(policies) {
        return Object.values(policies).reduce((sum, value) => sum + value, 0);
      }

      function getEffectModifiers(activeEffects) {
        return activeEffects.reduce(
          (acc, effect) => {
            const mods = effect.modifiers || {};
            if (mods.foodMultiplier) acc.foodMultiplier *= mods.foodMultiplier;
            if (mods.industryMultiplier) acc.industryMultiplier *= mods.industryMultiplier;
            if (mods.knowledgeMultiplier) acc.knowledgeMultiplier *= mods.knowledgeMultiplier;
            if (mods.foodDemandMultiplier) acc.foodDemandMultiplier *= mods.foodDemandMultiplier;
            if (mods.populationDelta) acc.populationDelta += mods.populationDelta;
            return acc;
          },
          {
            foodMultiplier: 1,
            industryMultiplier: 1,
            knowledgeMultiplier: 1,
            foodDemandMultiplier: 1,
            populationDelta: 0,
          }
        );
      }

      function chooseEvent(state, seed) {
        const weightEntries = Object.entries(EVENT_DEFS).map(([key, def]) => ({
          key,
          weight: Math.max(0, def.weight(state)),
        }));
        const totalWeight = weightEntries.reduce((sum, entry) => sum + entry.weight, 0);
        const calmWeight = 2.8;
        const { seed: afterRoll, value } = takeRandom(seed);
        let cursor = value * (totalWeight + calmWeight);
        if (cursor < calmWeight) {
          return { seed: afterRoll, eventKey: null };
        }
        cursor -= calmWeight;
        for (const entry of weightEntries) {
          cursor -= entry.weight;
          if (cursor <= 0) {
            return { seed: afterRoll, eventKey: entry.key };
          }
        }
        return { seed: afterRoll, eventKey: weightEntries[weightEntries.length - 1]?.key || null };
      }

      function applyImmediateEffects(state, effects) {
        const updated = { ...state };
        for (const [key, delta] of Object.entries(effects || {})) {
          if (key === "population") {
            updated.population = clamp(Math.round(updated.population + delta), 0, 500);
          } else if (key === "food") {
            updated.food = clamp(updated.food + delta, 0, 300);
          } else if (key === "industry") {
            updated.industry = clamp(updated.industry + delta, 0, 300);
          } else if (key === "knowledge") {
            updated.knowledge = clamp(updated.knowledge + delta, 0, 300);
          } else if (["happiness", "health", "environment", "stability", "unrest"].includes(key)) {
            updated[key] = clamp(updated[key] + delta, 0, 100);
          }
        }
        return updated;
      }

      // Deterministic turn pipeline: update resources, apply civic drift, resolve one event, then check progression.
      function simulateTurn(currentState) {
        if (currentState.status === "won" || currentState.status === "lost") {
          return currentState;
        }

        const policy = currentState.policies;
        const previousStage = currentState.developmentStage;
        let next = {
          ...currentState,
          turn: currentState.turn + 1,
          year: currentState.year + YEAR_STEP,
        };
        const logEntries = [];

        const effectMods = getEffectModifiers(currentState.activeEffects);
        next.activeEffects = currentState.activeEffects
          .map((effect) => ({ ...effect, turnsLeft: effect.turnsLeft - 1 }))
          .filter((effect) => effect.turnsLeft > 0);

        const stageIndex = Math.max(0, stageIndexFromLabel(currentState.developmentStage));
        const healthFactor = 0.65 + currentState.health / 200;
        const environmentFactor = 0.68 + currentState.environment / 180;
        const stabilityFactor = 0.68 + currentState.stability / 200;
        const happinessFactor = 0.65 + currentState.happiness / 200;
        const pollutionPenalty = 1 - Math.max(0, 58 - currentState.environment) / 180;

        const foodProduction =
          currentState.population *
          (0.55 + 0.12 * policy.agriculture + 0.03 * currentState.technologyLevel) *
          healthFactor *
          environmentFactor *
          effectMods.foodMultiplier;
        const industryProduction =
          currentState.population *
          (0.35 + 0.12 * policy.industry) *
          stabilityFactor *
          pollutionPenalty *
          effectMods.industryMultiplier *
          (1 - policy.environment * 0.03);
        const knowledgeProduction =
          currentState.population *
          (0.18 + 0.1 * policy.education + 0.12 * policy.research) *
          happinessFactor *
          (1 + currentState.technologyLevel * 0.02) *
          effectMods.knowledgeMultiplier;

        const industryMaintenance =
          policy.health * 3.2 + policy.welfare * 2.8 + policy.research * 4 + policy.environment * 1.8;
        const foodMaintenance = policy.welfare * 2 + policy.research * 1.4;
        const foodDemand =
          currentState.population * (1 + stageIndex * 0.02) * effectMods.foodDemandMultiplier;

        const newFood = clamp(currentState.food + foodProduction - foodDemand - foodMaintenance, 0, 300);
        const newIndustry = clamp(currentState.industry + industryProduction - industryMaintenance, 0, 300);
        const newKnowledge = clamp(currentState.knowledge + knowledgeProduction, 0, 300);

        const foodDelta = newFood - currentState.food;
        const industryDelta = newIndustry - currentState.industry;
        const knowledgeDelta = newKnowledge - currentState.knowledge;
        const shortage = Math.max(0, foodDemand + foodMaintenance - (currentState.food + foodProduction));
        const surplusRatio = (newFood + 1) / Math.max(1, currentState.population);

        next.food = round1(newFood);
        next.industry = round1(newIndustry);
        next.knowledge = round1(newKnowledge);

        const happinessDelta =
          policy.welfare * 1.8 +
          policy.education * 0.7 -
          policy.security * 0.6 -
          policy.industry * 0.4 +
          (foodDelta > 5 ? 1.3 : 0) -
          shortage * 0.22;
        const healthDelta =
          policy.health * 2.2 +
          (foodDelta > 0 ? 0.8 : 0) -
          policy.industry * 0.55 -
          shortage * 0.35 -
          Math.max(0, 42 - currentState.environment) / 26;
        const environmentDelta =
          policy.environment * 2.4 -
          policy.industry * 1.65 -
          policy.agriculture * 0.45 +
          (policy.research >= 2 ? 0.45 : 0);
        const unrestDelta =
          1.2 +
          Math.max(0, 48 - currentState.happiness) / 18 +
          Math.max(0, 55 - currentState.stability) / 20 +
          Math.max(0, 50 - currentState.environment) / 28 -
          policy.security * 1.6 -
          policy.welfare * 0.8 +
          shortage * 0.26;

        next.happiness = clamp(round1(currentState.happiness + happinessDelta), 0, 100);
        next.health = clamp(round1(currentState.health + healthDelta), 0, 100);
        next.environment = clamp(round1(currentState.environment + environmentDelta), 0, 100);
        next.unrest = clamp(round1(currentState.unrest + unrestDelta), 0, 100);

        const stabilityDelta =
          policy.security * 1.4 +
          policy.welfare * 0.5 +
          next.happiness / 70 -
          next.unrest / 36 -
          shortage * 0.28;
        next.stability = clamp(round1(currentState.stability + stabilityDelta), 0, 100);

        const populationPressure =
          (surplusRatio - 1.2) * 1.7 +
          (next.health - 55) / 22 +
          (next.happiness - 52) / 28 -
          next.unrest / 40 +
          effectMods.populationDelta;
        const populationDelta = clamp(Math.round(populationPressure), -10, 8);
        next.population = clamp(currentState.population + populationDelta, 0, 500);

        let rngSeed = currentState.rngSeed;
        const eventChoice = chooseEvent(next, rngSeed);
        rngSeed = eventChoice.seed;
        if (eventChoice.eventKey) {
          const definition = EVENT_DEFS[eventChoice.eventKey];
          const resolution = definition.apply(next);
          next = applyImmediateEffects(next, resolution.immediate);
          if (resolution.effect) {
            next.activeEffects = [...next.activeEffects, resolution.effect];
          }
          logEntries.unshift({
            id: `event-${next.turn}-${eventChoice.eventKey}`,
            year: next.year,
            turn: next.turn,
            title: definition.label,
            detail: definition.describe(next),
            icon: definition.icon,
            tag: resolution.effect ? `${resolution.effect.turnsLeft} turns` : "Immediate",
          });
        }

        if (next.projectQueue.length) {
          const projectGain = Math.max(4, round1(industryProduction * (0.2 + policy.industry * 0.03 + next.technologyLevel * 0.01)));
          const currentProject = { ...next.projectQueue[0], progress: round1(next.projectQueue[0].progress + projectGain) };
          const projectDef = PROJECT_DEFS[currentProject.key];
          if (currentProject.progress >= projectDef.cost) {
            next = applyImmediateEffects(next, projectDef.apply(next));
            next.projectQueue = next.projectQueue.slice(1);
            next.completedProjects = {
              ...next.completedProjects,
              [currentProject.key]: (next.completedProjects[currentProject.key] || 0) + 1,
            };
            logEntries.unshift({
              id: `project-${next.turn}-${currentProject.id}`,
              year: next.year,
              turn: next.turn,
              title: `Project Completed: ${projectDef.label}`,
              detail: `${projectDef.effect}. The village wrapped construction and shifted its labor onward.`,
              icon: projectDef.icon,
              tag: "Completed",
            });
          } else {
            next.projectQueue = [currentProject, ...next.projectQueue.slice(1)];
          }
        }

        next.technologyLevel = clamp(
          1 +
            Math.floor(next.knowledge / 35) +
            Math.floor((policy.research + policy.education) / 4),
          1,
          10
        );

        const stage = computeStage(next);
        next.developmentStage = stage.label;
        if (stage.label !== previousStage) {
          logEntries.unshift({
            id: `stage-${next.turn}-${stage.key}`,
            year: next.year,
            turn: next.turn,
            title: `Stage Reached: ${stage.label}`,
            detail: `Population, industry, and technology crossed into a new era.`,
            icon: "iconLegacy",
            tag: "Milestone",
          });
        }

        const prosperityBonus =
          (next.happiness + next.health + next.stability + Math.max(0, next.environment - 30)) / 8;
        next.legacyScore = Math.round(
          currentState.legacyScore +
            next.population * 0.35 +
            next.technologyLevel * 2 +
            prosperityBonus +
            stage.score
        );

        next.history = {
          food: historyPush(currentState.history.food, next.food),
          population: historyPush(currentState.history.population, next.population),
          knowledge: historyPush(currentState.history.knowledge, next.knowledge),
          legacyScore: historyPush(currentState.history.legacyScore, next.legacyScore),
        };

        next.lastBreakdown = {
          foodDelta: round1(next.food - currentState.food),
          industryDelta: round1(next.industry - currentState.industry),
          knowledgeDelta: round1(next.knowledge - currentState.knowledge),
          populationDelta: next.population - currentState.population,
        };

        if (
          next.developmentStage === "Spacefaring Society" &&
          next.population >= 180 &&
          next.stability >= 40 &&
          next.environment >= 25
        ) {
          next.status = "won";
          next.victoryText =
            "Your civilization reached a spacefaring future without collapsing its institutions or habitat.";
          logEntries.unshift({
            id: `victory-${next.turn}`,
            year: next.year,
            turn: next.turn,
            title: "Victory",
            detail: next.victoryText,
            icon: "iconLegacy",
            tag: "Success",
          });
        } else if (next.population <= 0 || next.health <= 0 || next.stability <= 0) {
          next.status = "lost";
          next.victoryText =
            next.population <= 0
              ? "The people are gone. Management turned into archaeology."
              : next.health <= 0
              ? "The civilization collapsed under public health failure."
              : "Authority dissolved and the state disintegrated.";
          logEntries.unshift({
            id: `loss-${next.turn}`,
            year: next.year,
            turn: next.turn,
            title: "Collapse",
            detail: next.victoryText,
            icon: "iconUnrest",
            tag: "Failure",
          });
        } else if (next.status === "menu") {
          next.status = "paused";
        }

        const activeEffectNames = next.activeEffects.map((effect) => `${effect.name} (${effect.turnsLeft})`);
        next.statusText =
          next.status === "won"
            ? next.victoryText
            : next.status === "lost"
            ? next.victoryText
            : activeEffectNames.length
            ? `Active effects: ${activeEffectNames.join(", ")}`
            : next.unrest > 60
            ? "Tension is climbing. Security, welfare, or actual competence would help."
            : next.environment < 35
            ? "The land is under strain. Industry is outrunning restraint."
            : next.population > 120 && next.food < 70
            ? "Growth is outrunning supply. Granaries first, speeches later."
            : "The machinery of civilization continues to complain, but mostly function.";

        next.eventLog = [...logEntries, ...currentState.eventLog].slice(0, 18);
        next.rngSeed = rngSeed;
        return next;
      }

      function reducer(state, action) {
        switch (action.type) {
          case "ASSETS_READY":
            return { ...state, assetsReady: true };
          case "START_GAME":
            return state.status === "menu" ? { ...state, status: "running" } : state;
          case "PAUSE_GAME":
            return state.status === "running" ? { ...state, status: "paused" } : state;
          case "RESUME_GAME":
            return state.status === "paused" ? { ...state, status: "running" } : state;
          case "STEP_TURN": {
            const stepped = simulateTurn({
              ...state,
              status: state.status === "running" ? "running" : "paused",
            });
            return stepped.status === "running" ? stepped : { ...stepped, status: stepped.status };
          }
          case "RESET_GAME": {
            const reset = createInitialState(action.seed);
            reset.assetsReady = state.assetsReady;
            return reset;
          }
          case "SET_POLICY": {
            if (state.status === "won" || state.status === "lost") return state;
            const current = state.policies[action.key];
            const nextLevel = clamp(current + action.delta, 0, 3);
            if (nextLevel === current) return state;
            const nextPolicies = { ...state.policies, [action.key]: nextLevel };
            if (totalPolicyPoints(nextPolicies) > POLICY_POINT_CAP) return state;
            return { ...state, policies: nextPolicies };
          }
          case "QUEUE_PROJECT": {
            if (!PROJECT_DEFS[action.key] || state.projectQueue.length >= 4) return state;
            return {
              ...state,
              projectQueue: [...state.projectQueue, makeProjectItem(action.key, state.nextQueueId)],
              nextQueueId: state.nextQueueId + 1,
            };
          }
          case "RENAME_SETTLEMENT":
            return action.name ? { ...state, settlementName: action.name.trim().slice(0, 32) } : state;
          default:
            return state;
        }
      }

      function loadAssetPack() {
        const svgMap = buildAssetSvgs();
        return Promise.all(
          Object.entries(svgMap).map(async ([key, svg]) => {
            const image = await createSvgImage(svg);
            return [key, { svg, uri: encodeSvg(svg), image }];
          })
        ).then((entries) => Object.fromEntries(entries));
      }

      function calculateTurnPreview(state) {
        const policy = state.policies;
        const stageIndex = Math.max(0, stageIndexFromLabel(state.developmentStage));
        const effectMods = getEffectModifiers(state.activeEffects);
        const healthFactor = 0.65 + state.health / 200;
        const environmentFactor = 0.68 + state.environment / 180;
        const stabilityFactor = 0.68 + state.stability / 200;
        const happinessFactor = 0.65 + state.happiness / 200;
        const pollutionPenalty = 1 - Math.max(0, 58 - state.environment) / 180;

        const foodProduction =
          state.population *
          (0.55 + 0.12 * policy.agriculture + 0.03 * state.technologyLevel) *
          healthFactor *
          environmentFactor *
          effectMods.foodMultiplier;
        const industryProduction =
          state.population *
          (0.35 + 0.12 * policy.industry) *
          stabilityFactor *
          pollutionPenalty *
          effectMods.industryMultiplier *
          (1 - policy.environment * 0.03);
        const knowledgeProduction =
          state.population *
          (0.18 + 0.1 * policy.education + 0.12 * policy.research) *
          happinessFactor *
          (1 + state.technologyLevel * 0.02) *
          effectMods.knowledgeMultiplier;
        const industryMaintenance =
          policy.health * 3.2 + policy.welfare * 2.8 + policy.research * 4 + policy.environment * 1.8;
        const foodMaintenance = policy.welfare * 2 + policy.research * 1.4;
        const foodDemand = state.population * (1 + stageIndex * 0.02) * effectMods.foodDemandMultiplier;

        const foodNet = round1(foodProduction - foodDemand - foodMaintenance);
        const industryNet = round1(industryProduction - industryMaintenance);
        const knowledgeNet = round1(knowledgeProduction);

        const shortage = Math.max(0, foodDemand + foodMaintenance - (state.food + foodProduction));
        const projectedFood = clamp(state.food + foodNet, 0, 300);
        const growthPressure =
          (projectedFood / Math.max(1, state.population) - 1.2) * 1.7 +
          (state.health - 55) / 22 +
          (state.happiness - 52) / 28 -
          state.unrest / 40 +
          effectMods.populationDelta;
        const projectGain = state.projectQueue.length
          ? Math.max(4, round1(industryProduction * (0.2 + policy.industry * 0.03 + state.technologyLevel * 0.01)))
          : 0;

        return {
          foodProduction: round1(foodProduction),
          industryProduction: round1(industryProduction),
          knowledgeProduction: round1(knowledgeProduction),
          industryMaintenance: round1(industryMaintenance),
          foodMaintenance: round1(foodMaintenance),
          foodDemand: round1(foodDemand),
          foodNet,
          industryNet,
          knowledgeNet,
          shortage,
          projectedFood,
          growthPressure: round1(growthPressure),
          projectGain,
        };
      }

      function getStatusChip(status) {
        if (status === "good") return { tone: "good", label: "OK Active" };
        if (status === "bad") return { tone: "bad", label: "Alert Critical" };
        return { tone: "warn", label: "Watch Closely" };
      }
